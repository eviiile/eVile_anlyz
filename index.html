<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>EVILE | محرك بحث الوسائط المتقدم - عرض محدود مع المزيد</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', -apple-system, 'SF Pro Text', system-ui, sans-serif;
        }

        /* متغيرات الألوان - نفس النظام السابق */
        :root {
            --bg-gradient-start: #eef2f8;
            --bg-gradient-end: #d9e2ec;
            --glass-bg: rgba(255, 255, 255, 0.68);
            --glass-border: rgba(120, 140, 160, 0.2);
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-primary: #1c2c38;
            --text-secondary: #2c4b5e;
            --accent: #5aa9b0;
            --accent-glow: rgba(90, 169, 176, 0.3);
            --btn-gradient: linear-gradient(135deg, #5aa9b0, #3e7a82);
            --shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 32px -12px rgba(0, 0, 0, 0.15);
            --sidebar-bg: rgba(255, 255, 255, 0.85);
        }

        body.dark {
            --bg-gradient-start: #121826;
            --bg-gradient-end: #0a0f16;
            --glass-bg: rgba(22, 28, 40, 0.7);
            --glass-border: rgba(80, 110, 130, 0.3);
            --card-bg: rgba(28, 35, 48, 0.65);
            --text-primary: #f0f4fa;
            --text-secondary: #bfd6e8;
            --accent: #7fc1cc;
            --accent-glow: rgba(127, 193, 204, 0.25);
            --btn-gradient: linear-gradient(135deg, #7fc1cc, #5599aa);
            --sidebar-bg: rgba(28, 35, 48, 0.92);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            transition: background 0.3s ease;
            position: relative;
            padding-bottom: 72px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, var(--accent-glow) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== الهيدر العلوي ========== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            padding: 0.7rem 1.2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        /* زر القائمة الجانبية (أيقونة المستخدم) */
        .user-menu-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--accent);
            font-size: 1.3rem;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }
        .user-menu-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(0.96);
        }

        .search-wrapper {
            flex: 1;
            max-width: 550px;
            margin: 0;
        }
        .search-field {
            position: relative;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            border: 1px solid var(--glass-border);
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }
        body.dark .search-field {
            background: rgba(30, 38, 52, 0.6);
        }
        .search-field:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .search-field input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 52px 12px 20px;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            font-weight: 500;
        }
        .search-icon-inside {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 1.1rem;
            cursor: pointer;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-icon-inside:hover {
            background: var(--accent-glow);
        }

        /* القائمة الجانبية (Sidebar) */
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            z-index: 1200;
            background: var(--sidebar-bg);
            backdrop-filter: blur(32px);
            border-left: 1px solid var(--glass-border);
            box-shadow: -8px 0 30px rgba(0, 0, 0, 0.1);
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            gap: 1.8rem;
        }
        .sidebar.open {
            right: 0;
        }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.8rem;
        }
        .sidebar-header h3 {
            color: var(--text-primary);
            font-size: 1.2rem;
        }
        .close-sidebar {
            background: transparent;
            border: none;
            font-size: 1.4rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .user-avatar-large {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .avatar-circle {
            width: 90px;
            height: 90px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            color: white;
            box-shadow: var(--shadow);
            border: 3px solid var(--glass-border);
        }
        .user-greeting {
            color: var(--text-primary);
            font-weight: 600;
        }
        .theme-switch-sidebar {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-primary);
            font-weight: 500;
        }
        .theme-switch-sidebar i {
            font-size: 1.2rem;
            color: var(--accent);
        }
        .theme-switch-sidebar:hover {
            background: var(--accent-glow);
        }
        .sidebar-footer {
            margin-top: auto;
            font-size: 0.7rem;
            text-align: center;
            color: var(--text-secondary);
        }

        /* المحتوى الرئيسي */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 5.5rem 1.2rem 1.8rem;
            position: relative;
            z-index: 2;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-bottom: 1.5rem;
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.15, 0.85, 0.35, 1);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }
        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }
        .media-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .media-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            max-height: 280px;
        }
        .video-player-wrapper {
            position: relative;
            width: 100%;
            background: #1a262e;
        }
        .video-player-wrapper video {
            width: 100%;
            height: auto;
            max-height: 280px;
            display: block;
            object-fit: contain;
        }
        .custom-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(90, 169, 176, 0.9);
            backdrop-filter: blur(12px);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            font-size: 1.3rem;
            border: 2px solid rgba(255,255,255,0.8);
        }
        .card-info {
            padding: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid var(--glass-border);
        }
        .card-author {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            gap: 6px;
            overflow: hidden;
            white-space: nowrap;
        }
        .download-btn {
            background: var(--btn-gradient);
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            color: white;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            gap: 5px;
        }
        .download-btn:active { transform: scale(0.94); }
        .load-more-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            display: block;
            margin: 1rem auto 2rem;
            transition: 0.2s;
            text-align: center;
            width: fit-content;
        }
        .load-more-btn:hover {
            background: var(--accent);
            color: white;
        }
        .center-image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 65vh;
            flex-direction: column;
            gap: 1rem;
        }
        .sticker-placeholder {
            max-width: 180px;
            opacity: 0.8;
        }
        .loader, .no-results {
            text-align: center;
            padding: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 48px;
        }
        .developer-page {
            text-align: center;
            padding: 1rem;
        }
        .cracked-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #3a7a82);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            border-top: 1px solid var(--glass-border);
            padding: 8px 0 14px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }
        .nav-item {
            flex: 1;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.5rem;
            transition: 0.2s;
        }
        .nav-item.active {
            color: var(--accent);
            transform: translateY(-2px);
        }
        .toast-notify {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.75rem;
            z-index: 2000;
        }
        @media (max-width: 640px) {
            .sidebar { width: 260px; }
        }
    </style>
</head>
<body>

<!-- الهيدر: أيقونة المستخدم (القائمة الجانبية) + حقل بحث -->
<div class="top-bar">
    <button class="user-menu-btn" id="userMenuBtn"><i class="fas fa-user-circle"></i></button>
    <div class="search-wrapper">
        <div class="search-field">
            <input type="text" id="searchInput" placeholder="بحث بالإنكليزية... صور، فيديوهات، رسوم">
            <button class="search-icon-inside" id="searchIconBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>
</div>

<!-- القائمة الجانبية (Sidebar) -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3><i class="fas fa-id-card"></i> ملفي</h3>
        <button class="close-sidebar" id="closeSidebarBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="user-avatar-large">
        <div class="avatar-circle" id="userAvatar">👤</div>
        <div class="user-greeting" id="userGreeting">مرحباً، زائر</div>
    </div>
    <!-- زر تبديل الوضع داخل القائمة الجانبية متحرك -->
    <div class="theme-switch-sidebar" id="sidebarThemeToggle">
        <span><i class="fas fa-moon"></i> <span id="themeText">الوضع الليلي</span></span>
        <i class="fas fa-chevron-left"></i>
    </div>
    <div class="sidebar-footer">
        <i class="fas fa-fingerprint"></i> رمزك الفريد
    </div>
</div>

<div class="main-content" id="mainContent">
    <div id="resultsContainer" class="results-grid">
        <div class="center-image-container">
            <img src="https://i.ibb.co/tMgcTJh2/x.png" class="sticker-placeholder" alt="EVILE">
            <div class="center-text"><i class="fas fa-sparkles"></i> اختر نوع الوسائط وابحث</div>
        </div>
    </div>
</div>

<div class="bottom-nav" id="bottomNav">
    <button class="nav-item" data-tab="photos"><i class="fas fa-camera-retro"></i></button>
    <button class="nav-item" data-tab="videos"><i class="fas fa-clapperboard"></i></button>
    <button class="nav-item" data-tab="illustrations"><i class="fas fa-pen-fancy"></i></button>
    <button class="nav-item" data-tab="developer"><i class="fas fa-crown"></i></button>
</div>

<script>
    // ======================== API KEYS ========================
    const UNSPLASH_KEY = "OpHNnO4VRwNS_4CIuUXk2hsWHBPmgLrOa4Hp0b8b_L4";
    const PIXABAY_KEY = "51444506-bffefcaf12816bd85a20222d1";
    const PEXELS_KEY = "1OrBtuFWP0BxjzlGqusrMj6RTjy7i8duDbgVDwJbSehBlHgRxKMnuG4F";

    // DOM elements
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchIconBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const navItems = document.querySelectorAll('.nav-item');
    const sidebar = document.getElementById('sidebar');
    const userMenuBtn = document.getElementById('userMenuBtn');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    const sidebarThemeToggle = document.getElementById('sidebarThemeToggle');
    const userAvatarDiv = document.getElementById('userAvatar');
    const userGreetingSpan = document.getElementById('userGreeting');

    let currentTab = "photos";
    let currentQuery = "";
    let isDeveloperPage = false;
    
    // Pagination: تخزين النتائج الكاملة وعدد المعروض
    let fullResultsArray = [];      // مصفوفة كاملة (حتى 20)
    let displayedCount = 0;         // عدد المعروض حاليًا
    let maxResults = 20;            // الحد الأقصى 20
    let currentType = '';           // 'photos', 'videos', 'illustrations'
    
    // ---- توليد رمز مميز لكل مستخدم (avatar) ----
    function generateUserToken() {
        let stored = localStorage.getItem('evile_user_avatar');
        if (stored) return stored;
        const icons = ['🐱', '🦊', '🐼', '🐨', '🦁', '🐧', '🐙', '🌸', '⭐', '🎨', '📷', '🎬', '👑'];
        const randomIcon = icons[Math.floor(Math.random() * icons.length)];
        localStorage.setItem('evile_user_avatar', randomIcon);
        return randomIcon;
    }
    const userIcon = generateUserToken();
    userAvatarDiv.innerHTML = userIcon;
    userGreetingSpan.innerHTML = `مرحباً، المستخدم ${userIcon}`;
    
    // ---- إدارة القائمة الجانبية ----
    function openSidebar() { sidebar.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); }
    userMenuBtn.addEventListener('click', openSidebar);
    closeSidebarBtn.addEventListener('click', closeSidebar);
    document.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && !userMenuBtn.contains(e.target) && sidebar.classList.contains('open')) {
            closeSidebar();
        }
    });
    
    // ---- تبديل الوضع (النهاري/الليلي) من القائمة الجانبية ----
    function initTheme() {
        const saved = localStorage.getItem('evile_theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeText').innerHTML = 'الوضع النهاري';
        } else {
            document.body.classList.remove('dark');
            document.getElementById('themeText').innerHTML = 'الوضع الليلي';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('evile_theme', 'light');
            document.getElementById('themeText').innerHTML = 'الوضع الليلي';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('evile_theme', 'dark');
            document.getElementById('themeText').innerHTML = 'الوضع النهاري';
        }
    }
    sidebarThemeToggle.addEventListener('click', toggleTheme);
    initTheme();
    
    // Helper: عرض حالة فارغة
    function showEmptyState(msg = "ابدأ البحث بالكلمات الإنجليزية") {
        if (isDeveloperPage) return;
        resultsContainer.innerHTML = `<div class="center-image-container"><img src="https://i.ibb.co/tMgcTJh2/x.png" class="sticker-placeholder"><div class="center-text">${msg}</div></div>`;
    }
    
    // صفحة المطور
    function showDeveloperPage() {
        isDeveloperPage = true;
        resultsContainer.innerHTML = `<div class="developer-page"><div class="cracked-title">إيفيل</div><div class="dev-description" style="background:var(--glass-bg); border-radius:28px; padding:1rem;">منصة متكاملة للصور والفيديوهات والرسوم بتقنية زجاجية</div><div class="credit-note">جميع الحقوق محفوظة</div></div>`;
    }
    
    // دوال التحميل (نفس السابق)
    async function downloadWithSpinner(btn, url, filename) {
        if (!url) { alert("لا رابط"); return; }
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
        btn.classList.add('disabled');
        try {
            const resp = await fetch(url, { mode: 'cors' });
            if (!resp.ok) throw new Error();
            const blob = await resp.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl; a.download = filename;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
            const toast = document.createElement('div'); toast.className = 'toast-notify';
            toast.innerHTML = `✅ تم التحميل: ${filename}`;
            document.body.appendChild(toast); setTimeout(() => toast.remove(), 1500);
        } catch(e) { alert("حاول حفظ الرابط بزر الفأرة الأيمن"); }
        finally { btn.innerHTML = orig; btn.classList.remove('disabled'); }
    }
    function attachDownloadEvents() {
        document.querySelectorAll('.download-btn').forEach(btn => {
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const url = newBtn.getAttribute('data-url');
                const filename = newBtn.getAttribute('data-filename');
                if (url) await downloadWithSpinner(newBtn, url, filename);
                else alert("رابط غير متوفر");
            });
        });
    }
    function setupVideoPlayers() {
        document.querySelectorAll('.video-player-wrapper').forEach(wrapper => {
            const video = wrapper.querySelector('video');
            const playBtn = wrapper.querySelector('.custom-play-btn');
            if (!video) return;
            if (playBtn) {
                const newBtn = playBtn.cloneNode(true);
                playBtn.parentNode.replaceChild(newBtn, playBtn);
                newBtn.addEventListener('click', () => { video.play(); newBtn.style.display = 'none'; });
                video.addEventListener('pause', () => { if (video.currentTime === 0 || video.ended) newBtn.style.display = 'flex'; else if (video.paused) newBtn.style.display = 'flex'; });
                video.addEventListener('play', () => newBtn.style.display = 'none');
                video.addEventListener('ended', () => newBtn.style.display = 'flex');
            }
            video.setAttribute('controls', 'controls');
        });
    }
    
    // ----- عرض النتائج مع زر "عرض المزيد" (أول 5 ثم +5 حتى 20) -----
    function renderPaginated() {
        if (isDeveloperPage) return;
        if (!fullResultsArray.length) {
            resultsContainer.innerHTML = `<div class="no-results">لا توجد نتائج</div>`;
            return;
        }
        let itemsToShow = fullResultsArray.slice(0, displayedCount);
        let html = '';
        for (let item of itemsToShow) {
            if (currentType === 'photos') {
                html += `<div class="glass-card"><div class="media-container"><img src="${item.url}" loading="lazy"></div><div class="card-info"><div class="card-author"><i class="fas fa-user"></i> ${item.author}</div><button class="download-btn" data-url="${item.fullUrl}" data-filename="evile_${item.id}.jpg"><i class="fas fa-download"></i> تنزيل</button></div></div>`;
            } else if (currentType === 'videos') {
                html += `<div class="glass-card"><div class="video-player-wrapper"><video preload="metadata" poster="${item.poster}"><source src="${item.videoUrl}" type="video/mp4"></video><div class="custom-play-btn"><i class="fas fa-play"></i></div></div><div class="card-info"><div class="card-author"><i class="fas fa-film"></i> ${item.author}</div><button class="download-btn" data-url="${item.videoUrl}" data-filename="evile_video_${item.id}.mp4"><i class="fas fa-download"></i> تنزيل</button></div></div>`;
            } else if (currentType === 'illustrations') {
                html += `<div class="glass-card"><div class="media-container"><img src="${item.url}" loading="lazy"></div><div class="card-info"><div class="card-author"><i class="fas fa-brush"></i> ${item.author}</div><button class="download-btn" data-url="${item.fullUrl}" data-filename="evile_draw_${item.id}.jpg"><i class="fas fa-download"></i> تنزيل</button></div></div>`;
            }
        }
        // إضافة زر "عرض المزيد" إذا كان هناك المزيد وليس كل شيء معروضاً
        if (displayedCount < fullResultsArray.length && displayedCount < maxResults) {
            html += `<div style="grid-column:1/-1; text-align:center;"><button class="load-more-btn" id="loadMoreBtn">📥 عرض المزيد (+5)</button></div>`;
        }
        resultsContainer.innerHTML = html;
        attachDownloadEvents();
        if (currentType === 'videos') setupVideoPlayers();
        const loadBtn = document.getElementById('loadMoreBtn');
        if (loadBtn) loadBtn.addEventListener('click', () => {
            let next = Math.min(displayedCount + 5, fullResultsArray.length, maxResults);
            if (next > displayedCount) {
                displayedCount = next;
                renderPaginated();
            }
        });
    }
    
    // ---- جلب البيانات وتحويلها لمصفوفة موحدة وتخزينها ----
    async function fetchUnsplash(query) {
        const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=20&client_id=${UNSPLASH_KEY}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        if (!data.results?.length) { resultsContainer.innerHTML = `<div class="no-results">لا توجد صور</div>`; return false; }
        fullResultsArray = data.results.slice(0,20).map(p => ({ type:'photo', id:p.id, url:p.urls.regular, fullUrl:p.urls.full, author:p.user.name }));
        currentType = 'photos';
        displayedCount = Math.min(5, fullResultsArray.length);
        renderPaginated();
        return true;
    }
    async function fetchPexelsVideos(query) {
        const url = `https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=20`;
        const resp = await fetch(url, { headers: { Authorization: PEXELS_KEY } });
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        if (!data.videos?.length) { resultsContainer.innerHTML = `<div class="no-results">لا توجد فيديوهات</div>`; return false; }
        fullResultsArray = data.videos.slice(0,20).map(v => {
            let best = v.video_files.find(f=>f.quality==='hd') || v.video_files.find(f=>f.quality==='sd') || v.video_files[0];
            return { id:v.id, videoUrl:best?.link || '', poster:v.image, author:v.user?.name || 'مصور' };
        });
        currentType = 'videos';
        displayedCount = Math.min(5, fullResultsArray.length);
        renderPaginated();
        return true;
    }
    async function fetchPixabayIllustrations(query) {
        const url = `https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${encodeURIComponent(query)}&image_type=illustration&per_page=20&safesearch=true`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        if (!data.hits?.length) { resultsContainer.innerHTML = `<div class="no-results">لا توجد رسوم</div>`; return false; }
        fullResultsArray = data.hits.slice(0,20).map(h => ({ id:h.id, url:h.webformatURL, fullUrl:h.largeImageURL || h.imageURL, author:h.user }));
        currentType = 'illustrations';
        displayedCount = Math.min(5, fullResultsArray.length);
        renderPaginated();
        return true;
    }
    
    function showLoading() {
        if (!isDeveloperPage) resultsContainer.innerHTML = `<div class="loader"><i class="fas fa-spinner fa-pulse"></i> جاري البحث...</div>`;
    }
    function containsArabic(t) { return /[\u0600-\u06FF]/.test(t); }
    function showEnglishOnlyAlert() {
        const toast = document.createElement('div'); toast.className = 'toast-notify';
        toast.innerHTML = '⚠️ الرجاء استخدام الكلمات الإنجليزية فقط';
        document.body.appendChild(toast); setTimeout(()=>toast.remove(),2000);
    }
    async function performSearch() {
        if (currentTab === "developer") { showDeveloperPage(); return; }
        let query = searchInput.value.trim();
        if (!query) { showEmptyState(); return; }
        if (containsArabic(query)) { showEnglishOnlyAlert(); showEmptyState(); return; }
        currentQuery = query;
        isDeveloperPage = false;
        showLoading();
        try {
            if (currentTab === "photos") await fetchUnsplash(query);
            else if (currentTab === "videos") await fetchPexelsVideos(query);
            else if (currentTab === "illustrations") await fetchPixabayIllustrations(query);
        } catch(e) { resultsContainer.innerHTML = `<div class="no-results">خطأ في الاتصال</div>`; }
    }
    
    function switchTab(tabId) {
        currentTab = tabId;
        isDeveloperPage = (tabId === "developer");
        navItems.forEach(item => { if(item.getAttribute('data-tab')===tabId) item.classList.add('active'); else item.classList.remove('active'); });
        if(tabId === "developer") showDeveloperPage();
        else {
            let q = searchInput.value.trim();
            if(q && !containsArabic(q)) performSearch();
            else showEmptyState(`اختر ${tabId==='photos'?'الصور':tabId==='videos'?'الفيديوهات':'الرسوم'} وابحث`);
        }
    }
    
    navItems.forEach(item => item.addEventListener('click', () => switchTab(item.getAttribute('data-tab'))));
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });
    switchTab("photos");
</script>
</body>
</html>
