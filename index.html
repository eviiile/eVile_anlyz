<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>EVILE | خدمات الوسائط المتكاملة - زجاجي فاخر</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', -apple-system, 'SF Pro Text', system-ui, sans-serif;
        }

        /* ===== متغيرات الألوان الفاخرة ===== */
        :root {
            --bg-gradient-start: #f5f7fc;
            --bg-gradient-end: #e3e9f2;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-bg-solid: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(210, 220, 240, 0.5);
            --card-bg: rgba(255, 255, 255, 0.35);
            --text-primary: #1e2b3c;
            --text-secondary: #2e445b;
            --accent: #9d7e5e;
            --accent-glow: rgba(157, 126, 94, 0.25);
            --btn-gradient: linear-gradient(145deg, #b99b7b, #8f6e50);
            --shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.12), 0 3px 12px rgba(0,0,0,0.04);
            --shadow-hover: 0 25px 40px -15px rgba(0, 0, 0, 0.2);
            --sidebar-bg: rgba(255, 255, 255, 0.5);
            --glass-blur: blur(24px);
            --border-glow: 0 0 0 1px rgba(255,255,255,0.6) inset, 0 6px 15px rgba(157, 126, 94, 0.08);
        }

        body.dark {
            --bg-gradient-start: #0b1017;
            --bg-gradient-end: #04080e;
            --glass-bg: rgba(18, 28, 40, 0.3);
            --glass-bg-solid: rgba(22, 32, 45, 0.6);
            --glass-border: rgba(100, 140, 170, 0.4);
            --card-bg: rgba(20, 30, 44, 0.4);
            --text-primary: #f0f5fc;
            --text-secondary: #cbdae8;
            --accent: #c6a87c;
            --accent-glow: rgba(198, 168, 124, 0.3);
            --btn-gradient: linear-gradient(145deg, #d4b58a, #a8835c);
            --sidebar-bg: rgba(18, 28, 40, 0.7);
            --shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5), 0 3px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 25px 40px -15px rgba(0, 0, 0, 0.7);
            --border-glow: 0 0 0 1px rgba(255,255,255,0.1) inset, 0 6px 15px rgba(198, 168, 124, 0.15);
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, var(--accent-glow) 0%, transparent 55%), 
                        linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            transition: background 0.4s ease;
            position: relative;
            padding-bottom: 72px;
            backdrop-filter: blur(5px);
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 80%, rgba(255,255,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== الهيدر ========== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            padding: 0.6rem 1.2rem;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1.5px solid var(--glass-border);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-menu-btn {
            background: var(--glass-bg-solid);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid var(--glass-border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s;
            color: var(--accent);
            font-size: 1.4rem;
            box-shadow: var(--shadow), var(--border-glow);
            flex-shrink: 0;
        }
        .user-menu-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(0.94);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-title {
            flex: 1;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.3px;
        }

        .back-home-btn {
            background: var(--glass-bg-solid);
            border: 1.5px solid var(--glass-border);
            border-radius: 40px;
            padding: 6px 14px;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }
        .back-home-btn.visible {
            display: flex;
        }

        /* ========== القائمة الجانبية ========== */
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            z-index: 1200;
            background: var(--sidebar-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-left: 1.5px solid var(--glass-border);
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.2);
            transition: right 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            gap: 1.5rem;
        }
        .sidebar.open { right: 0; }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.8rem;
        }
        .sidebar-header h3 { color: var(--text-primary); font-size: 1.2rem; font-weight: 600; }
        .close-sidebar { background: transparent; border: none; font-size: 1.4rem; color: var(--text-secondary); cursor: pointer; }
        .close-sidebar:hover { color: var(--accent); }
        .user-avatar-large { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; margin: 0.3rem 0; }
        .avatar-circle {
            width: 85px; height: 85px; background: var(--btn-gradient); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            font-weight: bold; color: white; box-shadow: var(--shadow), var(--border-glow);
            border: 3px solid rgba(255,255,255,0.5);
        }
        .user-greeting { color: var(--text-primary); font-weight: 600; font-size: 1rem; }
        .theme-switch-sidebar {
            background: var(--glass-bg-solid); border: 1.5px solid var(--glass-border);
            border-radius: 50px; padding: 12px 16px; display: flex; align-items: center;
            justify-content: space-between; cursor: pointer; transition: 0.25s;
            color: var(--text-primary); font-weight: 600; font-size: 0.9rem;
            box-shadow: var(--shadow); backdrop-filter: blur(16px);
        }
        .theme-switch-sidebar i { font-size: 1.1rem; color: var(--accent); }
        .theme-switch-sidebar:hover { background: var(--accent-glow); transform: scale(0.98); }
        .sidebar-footer { margin-top: auto; font-size: 0.7rem; text-align: center; color: var(--text-secondary); opacity: 0.9; }

        /* ========== المحتوى الرئيسي ========== */
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 5.5rem 1.2rem 2rem;
            position: relative;
            z-index: 2;
        }

        /* الصفحة الرئيسية - البطاقتين (حجم صغير) */
        .home-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            justify-content: center;
            align-items: stretch;
        }
        .service-card {
            flex: 0 1 280px;  /* عرض ثابت صغير */
            max-width: 320px;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 32px;
            padding: 1.5rem 1.2rem;
            border: 1.5px solid var(--glass-border);
            box-shadow: var(--shadow), var(--border-glow);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        .service-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }
        .card-image {
            width: 100%;
            height: 140px;  /* أصغر من السابق */
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 1.2rem;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .service-card:hover .card-image img { transform: scale(1.03); }
        .card-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
            line-height: 1.3;
        }
        .card-desc {
            color: var(--text-secondary);
            font-size: 0.8rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
            flex: 1;
        }
        .card-desc ul {
            list-style: none;
            padding-right: 0.2rem;
        }
        .card-desc li {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-desc i {
            color: var(--accent);
            width: 16px;
            font-size: 0.9rem;
        }
        .card-action {
            margin-top: auto;
        }
        .primary-btn {
            background: var(--btn-gradient);
            border: none;
            border-radius: 50px;
            padding: 12px 16px;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.25s;
            backdrop-filter: blur(4px);
            text-decoration: none;
        }
        .primary-btn:hover {
            filter: brightness(1.1);
            transform: scale(0.98);
            box-shadow: 0 0 18px var(--accent-glow);
        }

        /* واجهة البحث (مخفية افتراضياً) */
        .search-interface {
            display: none;
        }
        .search-interface.active {
            display: block;
        }

        .search-wrapper {
            max-width: 550px;
            margin: 0 auto 1.8rem;
        }
        .search-field {
            position: relative;
            background: var(--glass-bg-solid);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1.5px solid var(--glass-border);
            transition: all 0.3s;
            box-shadow: var(--shadow), var(--border-glow);
        }
        .search-field:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow);
        }
        .search-field input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 50px 12px 20px;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            font-weight: 500;
        }
        .search-field input::placeholder { color: var(--text-secondary); opacity: 0.7; }
        .search-icon-inside {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 1.1rem;
            cursor: pointer;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 30px;
            overflow: hidden;
            border: 1.5px solid var(--glass-border);
            box-shadow: var(--shadow), var(--border-glow);
            display: flex;
            flex-direction: column;
        }
        .media-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            max-height: 240px;
        }
        .video-player-wrapper { position: relative; }
        .video-player-wrapper video { width: 100%; max-height: 240px; }
        .custom-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--btn-gradient); width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white;
            border: 2px solid rgba(255,255,255,0.7); cursor: pointer; font-size: 1.2rem;
        }
        .card-info {
            padding: 0.7rem 0.8rem; display: flex; justify-content: space-between;
            align-items: center; background: rgba(255,255,255,0.05);
        }
        .card-author { font-size: 0.7rem; }
        .download-btn {
            background: var(--btn-gradient); border: none; border-radius: 30px;
            padding: 6px 14px; color: white; font-weight: 700; font-size: 0.7rem;
            cursor: pointer; display: inline-flex; gap: 5px; align-items: center;
        }
        .load-more-btn {
            background: var(--glass-bg-solid); backdrop-filter: blur(20px);
            border: 1.5px solid var(--glass-border); border-radius: 50px;
            padding: 12px 24px; color: var(--accent); font-weight: 700; font-size: 0.9rem;
            cursor: pointer; margin: 1rem auto; display: block; width: fit-content;
        }
        .center-image-container {
            display: flex; justify-content: center; align-items: center;
            min-height: 50vh; flex-direction: column; gap: 1rem;
        }
        .sticker-placeholder { max-width: 160px; opacity: 0.9; }
        .center-text {
            color: var(--text-secondary); background: var(--glass-bg-solid);
            padding: 0.6rem 1.5rem; border-radius: 50px; backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); font-size: 0.9rem;
        }
        .loader, .no-results {
            text-align: center; padding: 2rem; background: var(--card-bg);
            backdrop-filter: blur(20px); border-radius: 40px;
            border: 1.5px solid var(--glass-border); color: var(--text-primary);
        }
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--glass-bg-solid);
            backdrop-filter: blur(30px); border-top: 1.5px solid var(--glass-border);
            padding: 8px 0 12px; display: flex; justify-content: space-around;
            z-index: 1000; box-shadow: 0 -8px 30px rgba(0,0,0,0.05);
        }
        .nav-item {
            flex: 1; background: transparent; border: none; cursor: pointer;
            color: var(--text-secondary); font-size: 1.4rem; transition: 0.2s;
        }
        .nav-item.active { color: var(--accent); transform: translateY(-3px); }
        .toast-notify {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg-solid); backdrop-filter: blur(30px);
            padding: 6px 18px; border-radius: 50px; font-size: 0.8rem;
            z-index: 2000; border: 1px solid var(--glass-border);
            color: var(--text-primary); box-shadow: var(--shadow);
        }

        /* تحسينات للجوال */
        @media (max-width: 600px) {
            .service-card { flex: 0 1 100%; max-width: 100%; }
            .card-image { height: 160px; }
        }
    </style>
</head>

    gotoSearchBtn.addEventListener('click', showSearchView);
    backHomeBtn.addEventListener('click', showHomeView);

    // ---- تهيئة المستخدم والثيم ----
    function generateUserToken() {
        let stored = localStorage.getItem('evile_user_avatar');
        if (stored) return stored;
        const icons = ['🐱', '🦊', '🐼', '🐨', '🦁', '🐧', '🐙', '🌸', '⭐', '🎨', '📷', '🎬', '👑'];
        const randomIcon = icons[Math.floor(Math.random() * icons.length)];
        localStorage.setItem('evile_user_avatar', randomIcon);
        return randomIcon;
    }
    const userIcon = generateUserToken();
    userAvatarDiv.innerHTML = userIcon;
    userGreetingSpan.innerHTML = `مرحباً، المستخدم ${userIcon}`;

    function openSidebar() { sidebar.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); }
    userMenuBtn.addEventListener('click', openSidebar);
    closeSidebarBtn.addEventListener('click', closeSidebar);
    document.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && !userMenuBtn.contains(e.target) && sidebar.classList.contains('open')) {
            closeSidebar();
        }
    });

    function initTheme() {
        const saved = localStorage.getItem('evile_theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeText').innerHTML = 'الوضع النهاري';
        } else {
            document.body.classList.remove('dark');
            document.getElementById('themeText').innerHTML = 'الوضع الليلي';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('evile_theme', 'light');
            document.getElementById('themeText').innerHTML = 'الوضع الليلي';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('evile_theme', 'dark');
            document.getElementById('themeText').innerHTML = 'الوضع النهاري';
        }
    }
    sidebarThemeToggle.addEventListener('click', toggleTheme);
    initTheme();

    // ---- دوال البحث ----
    function showEmptyState(msg = "ابدأ البحث بالكلمات الإنجليزية") {
        if (isDeveloperPage) return;
        resultsContainer.innerHTML = `<div class="center-image-container"><img src="https://i.ibb.co/tMgcTJh2/x.png" class="sticker-placeholder"><div class="center-text">${msg}</div></div>`;
    }

    function showDeveloperPage() {
        isDeveloperPage = true;
        resultsContainer.innerHTML = `<div class="developer-page" style="padding:2rem; background:var(--card-bg); border-radius:40px; text-align:center;"><div class="cracked-title" style="font-size:2.8rem; font-weight:800; color:var(--accent);">إيفيل</div><div class="dev-description" style="background:var(--glass-bg-solid); border-radius:30px; padding:1.2rem; margin:1.2rem 0;">منصة متكاملة للصور والفيديوهات والرسوم بتقنية زجاجية فاخرة</div><div style="color:var(--text-secondary);">جميع الحقوق محفوظة</div></div>`;
    }

    async function downloadWithSpinner(btn, url, filename) {
        if (!url) { alert("لا رابط"); return; }
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
        btn.classList.add('disabled');
        try {
            const resp = await fetch(url, { mode: 'cors' });
            if (!resp.ok) throw new Error();
            const blob = await resp.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl; a.download = filename;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
            const toast = document.createElement('div'); toast.className = 'toast-notify';
            toast.innerHTML = `✅ تم التحميل: ${filename}`;
            document.body.appendChild(toast); setTimeout(() => toast.remove(), 1500);
        } catch(e) { alert("حاول حفظ الرابط بزر الفأرة الأيمن"); }
        finally { btn.innerHTML = orig; btn.classList.remove('disabled'); }
    }
    function attachDownloadEvents() {
        document.querySelectorAll('.download-btn').forEach(btn => {
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const url = newBtn.getAttribute('data-url');
                const filename = newBtn.getAttribute('data-filename');
                if (url) await downloadWithSpinner(newBtn, url, filename);
                else alert("رابط غير متوفر");
            });
        });
    }
    function setupVideoPlayers() {
        document.querySelectorAll('.video-player-wrapper').forEach(wrapper => {
            const video = wrapper.querySelector('video');
            const playBtn = wrapper.querySelector('.custom-play-btn');
            if (!video) return;
            if (playBtn) {
                const newBtn = playBtn.cloneNode(true);
                playBtn.parentNode.replaceChild(newBtn, playBtn);
                newBtn.addEventListener('click', () => { video.play(); newBtn.style.display = 'none'; });
                video.addEventListener('pause', () => { if (video.currentTime === 0 || video.ended) newBtn.style.display = 'flex'; else if (video.paused) newBtn.style.display = 'flex'; });
                video.addEventListener('play', () => newBtn.style.display = 'none');
                video.addEventListener('ended', () => newBtn.style.display = 'flex');
            }
            video.setAttribute('controls', 'controls');
        });
    }

    function renderPaginated() {
        if (isDeveloperPage) return;
        if (!fullResultsArray.length) {
            resultsContainer.innerHTML = `<div class="no-results">لا توجد نتائج</div>`;
            return;
        }
        let itemsToShow = fullResultsArray.slice(0, displayedCount);
        let html = '';
        for (let item of itemsToShow) {
            if (currentType === 'photos') {
                html += `<div class="glass-card"><div class="media-container"><img src="${item.url}" loading="lazy"></div><div class="card-info"><div class="card-author"><i class="fas fa-user"></i> ${item.author}</div><button class="download-btn" data-url="${item.fullUrl}" data-filename="evile_${item.id}.jpg"><i class="fas fa-download"></i> تنزيل</button></div></div>`;
            } else if (currentType === 'videos') {
                html += `<div class="glass-card"><div class="video-player-wrapper"><video preload="metadata" poster="${item.poster}"><source src="${item.videoUrl}" type="video/mp4"></video><div class="custom-play-btn"><i class="fas fa-play"></i></div></div><div class="card-info"><div class="card-author"><i class="fas fa-film"></i> ${item.author}</div><button class="download-btn" data-url="${item.videoUrl}" data-filename="evile_video_${item.id}.mp4"><i class="fas fa-download"></i> تنزيل</button></div></div>`;
            } else if (currentType === 'illustrations') {
                html += `<div class="glass-card"><div class="media-container"><img src="${item.url}" loading="lazy"></div><div class="card-info"><div class="card-author"><i class="fas fa-brush"></i> ${item.author}</div><button class="download-btn" data-url="${item.fullUrl}" data-filename="evile_draw_${item.id}.jpg"><i class="fas fa-download"></i> تنزيل</button></div></div>`;
            }
        }
        if (displayedCount < fullResultsArray.length && displayedCount < maxResults) {
            html += `<div style="grid-column:1/-1; text-align:center;"><button class="load-more-btn" id="loadMoreBtn">📥 عرض المزيد (+5)</button></div>`;
        }
        resultsContainer.innerHTML = html;
        attachDownloadEvents();
        if (currentType === 'videos') setupVideoPlayers();
        const loadBtn = document.getElementById('loadMoreBtn');
        if (loadBtn) loadBtn.addEventListener('click', () => {
            let next = Math.min(displayedCount + 5, fullResultsArray.length, maxResults);
            if (next > displayedCount) {
                displayedCount = next;
                renderPaginated();
            }
        });
    }

    async function fetchUnsplash(query) {
        const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=20&client_id=${UNSPLASH_KEY}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        if (!data.results?.length) { resultsContainer.innerHTML = `<div class="no-results">لا توجد صور</div>`; return false; }
        fullResultsArray = data.results.slice(0,20).map(p => ({ type:'photo', id:p.id, url:p.urls.regular, fullUrl:p.urls.full, author:p.user.name }));
        currentType = 'photos';
        displayedCount = Math.min(5, fullResultsArray.length);
        renderPaginated();
        return true;
    }
    async function fetchPexelsVideos(query) {
        const url = `https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=20`;
        const resp = await fetch(url, { headers: { Authorization: PEXELS_KEY } });
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        if (!data.videos?.length) { resultsContainer.innerHTML = `<div class="no-results">لا توجد فيديوهات</div>`; return false; }
        fullResultsArray = data.videos.slice(0,20).map(v => {
            let best = v.video_files.find(f=>f.quality==='hd') || v.video_files.find(f=>f.quality==='sd') || v.video_files[0];
            return { id:v.id, videoUrl:best?.link || '', poster:v.image, author:v.user?.name || 'مصور' };
        });
        currentType = 'videos';
        displayedCount = Math.min(5, fullResultsArray.length);
        renderPaginated();
        return true;
    }
    async function fetchPixabayIllustrations(query) {
        const url = `https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${encodeURIComponent(query)}&image_type=illustration&per_page=20&safesearch=true`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        if (!data.hits?.length) { resultsContainer.innerHTML = `<div class="no-results">لا توجد رسوم</div>`; return false; }
        fullResultsArray = data.hits.slice(0,20).map(h => ({ id:h.id, url:h.webformatURL, fullUrl:h.largeImageURL || h.imageURL, author:h.user }));
        currentType = 'illustrations';
        displayedCount = Math.min(5, fullResultsArray.length);
        renderPaginated();
        return true;
    }

    function showLoading() {
        if (!isDeveloperPage) resultsContainer.innerHTML = `<div class="loader"><i class="fas fa-spinner fa-pulse"></i> جاري البحث...</div>`;
    }
    function containsArabic(t) { return /[\u0600-\u06FF]/.test(t); }
    function showEnglishOnlyAlert() {
        const toast = document.createElement('div'); toast.className = 'toast-notify';
        toast.innerHTML = '⚠️ الرجاء استخدام الكلمات الإنجليزية فقط';
        document.body.appendChild(toast); setTimeout(()=>toast.remove(),2000);
    }

    async function performSearch() {
        if (currentTab === "developer") { showDeveloperPage(); return; }
        let query = searchInput.value.trim();
        if (!query) { showEmptyState(); return; }
        if (containsArabic(query)) { showEnglishOnlyAlert(); showEmptyState(); return; }
        isDeveloperPage = false;
        showLoading();
        try {
            if (currentTab === "photos") await fetchUnsplash(query);
            else if (currentTab === "videos") await fetchPexelsVideos(query);
            else if (currentTab === "illustrations") await fetchPixabayIllustrations(query);
        } catch(e) { resultsContainer.innerHTML = `<div class="no-results">خطأ في الاتصال</div>`; }
    }

    function switchTab(tabId) {
        currentTab = tabId;
        isDeveloperPage = (tabId === "developer");
        navItems.forEach(item => { 
            if(item.getAttribute('data-tab')===tabId) item.classList.add('active'); 
            else item.classList.remove('active'); 
        });
        if(tabId === "developer") showDeveloperPage();
        else {
            let q = searchInput.value.trim();
            if(q && !containsArabic(q)) performSearch();
            else showEmptyState(`اختر ${tabId==='photos'?'الصور':tabId==='videos'?'الفيديوهات':'الرسوم'} وابحث`);
        }
    }

    navItems.forEach(item => item.addEventListener('click', () => switchTab(item.getAttribute('data-tab'))));
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });

    // التهيئة الأولية: عرض البطاقات الرئيسية
    showHomeView();
    switchTab("photos");
</script>
</body>
</html>
