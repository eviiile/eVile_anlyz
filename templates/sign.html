<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>انضم إلينا - EVILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(160deg, #ffffff 0%, #e4d8ff 100%);
            color: #1f153f;
            height: 100vh; height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* منع التمرير تماماً */
        }
        .sign-wrapper {
            width: 100%; max-width: 400px; 
            height: 100vh; height: 100dvh;
            display: flex; flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* الشعار */
        .logo-area { text-align: center; margin-bottom: 12px; }
        .logo-icon {
            width: 48px; height: 48px; border-radius: 16px;
            background: #6535e0; color: white;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px auto;
            box-shadow: 0 8px 20px rgba(101, 53, 224, 0.2);
        }
        .logo-icon i { font-size: 24px; }
        .logo-title { font-size: 22px; font-weight: 800; color: #1f153f; letter-spacing: 1px; }
        
        /* الميزات (مصغرة جداً) */
        .features-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
            width: 100%; margin-bottom: 16px;
        }
        .feature-item {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(101, 53, 224, 0.08);
            border-radius: 12px; padding: 10px 8px;
            text-align: center; transition: 0.2s;
        }
        .feature-item i { font-size: 20px; color: #6535e0; display: block; margin-bottom: 2px; }
        .feature-item span { font-size: 10px; font-weight: 600; color: #3b2b66; }

        /* بطاقة النموذج */
        .sign-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 20px 20px; width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.02);
        }
        .form-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; text-align: center; color: #1f153f; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: #3b2b66; margin-bottom: 4px; }
        .input-group input {
            width: 100%; padding: 10px 14px; background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(101, 53, 224, 0.1); border-radius: 12px; 
            font-family: 'Tajawal', sans-serif; font-size: 14px; color: #1f153f; outline: none; transition: 0.2s;
        }
        .input-group input:focus { border-color: #6535e0; background: #ffffff; }
        .btn-primary {
            width: 100%; padding: 12px; margin-top: 6px;
            background: #6535e0; border: none; border-radius: 12px;
            color: #fff; font-weight: 700; font-size: 15px;
            cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(101, 53, 224, 0.3);
        }
        .btn-primary:active { transform: scale(0.96); }
        .sign-error { color: #dc3545; font-size: 12px; margin-top: 8px; display: none; text-align: center; }
        .auth-switch { text-align: center; margin-top: 12px; font-size: 12px; color: #5a4591; }
        .auth-switch a { color: #6535e0; font-weight: 700; text-decoration: none; }

        /* إخفاء التمرير للموبايل */
        @media (max-width: 480px) {
            .sign-wrapper { max-width: 100%; padding: 16px; }
            .feature-item span { font-size: 9px; }
        }
    </style>
</head>
<body>

    <div class="sign-wrapper">
        <!-- الشعار -->
        <div class="logo-area">
            <div class="logo-icon"><i class="bi bi-magic"></i></div>
            <div class="logo-title">EVILE</div>
        </div>

        <!-- الميزات المصغرة -->
        <div class="features-grid">
            <div class="feature-item"><i class="bi bi-lightning-charge-fill"></i><span>توليد نصوص</span></div>
            <div class="feature-item"><i class="bi bi-robot"></i><span>شخصيات ذكية</span></div>
            <div class="feature-item"><i class="bi bi-pencil-square"></i><span>تصاميم شعارات</span></div>
            <div class="feature-item"><i class="bi bi-gem"></i><span>10 نقاط مجانية</span></div>
        </div>

        <!-- النموذج -->
        <div class="sign-card">
            <div class="form-title">انضم لتبدأ الإبداع</div>
            <form id="signForm" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <label><i class="bi bi-person"></i> اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسماً فريداً" required>
                </div>
                <div class="input-group">
                    <label><i class="bi bi-lock"></i> كلمة المرور</label>
                    <input type="password" id="password" placeholder="******" required>
                </div>
                <button type="submit" class="btn-primary">ابدأ مجاناً <i class="bi bi-arrow-left"></i></button>
                <div id="signError" class="sign-error"></div>
                <div class="auth-switch">
                    لديك حساب؟ <a href="#" onclick="switchToLogin()">سجل دخولك</a>
                </div>
            </form>
            
            <form id="loginForm" onsubmit="handleLogin(event)" style="display:none;">
                <div class="input-group">
                    <label><i class="bi bi-person"></i> اسم المستخدم</label>
                    <input type="text" id="loginUsername" placeholder="اسم المستخدم" required>
                </div>
                <div class="input-group">
                    <label><i class="bi bi-lock"></i> كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="******" required>
                </div>
                <button type="submit" class="btn-primary">دخول <i class="bi bi-box-arrow-in-left"></i></button>
                <div id="loginError" class="sign-error"></div>
                <div class="auth-switch">
                    جديد هنا؟ <a href="#" onclick="switchToSignup()">أنشئ حساباً</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function handleSignup(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('signError');
            errorDiv.style.display = 'none';

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.innerHTML = 'جاري التسجيل...';

            fetch('/api/signup', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(res => res.json()).then(data => {
                btn.disabled = false; btn.innerHTML = 'ابدأ مجاناً <i class="bi bi-arrow-left"></i>';
                if(data.success) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            }).catch(() => {
                btn.disabled = false; btn.innerHTML = 'ابدأ مجاناً <i class="bi bi-arrow-left"></i>';
                errorDiv.textContent = 'تعذر الاتصال بالخادم.';
                errorDiv.style.display = 'block';
            });
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');
            errorDiv.style.display = 'none';

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.innerHTML = 'جاري الدخول...';

            fetch('/api/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(res => res.json()).then(data => {
                btn.disabled = false; btn.innerHTML = 'دخول <i class="bi bi-box-arrow-in-left"></i>';
                if(data.success) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            }).catch(() => {
                btn.disabled = false; btn.innerHTML = 'دخول <i class="bi bi-box-arrow-in-left"></i>';
                errorDiv.textContent = 'تعذر الاتصال بالخادم.';
                errorDiv.style.display = 'block';
            });
        }

        function switchToLogin() {
            document.getElementById('signForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        function switchToSignup() {
            document.getElementById('signForm').style.display = 'block';
            document.getElementById('loginForm').style.display = 'none';
        }
    </script>
</body>
</html>
