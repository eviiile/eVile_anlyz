<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الشخصية - EVILE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e7ff;
            padding: 20px;
        }
        .edit-container {
            background: rgba(99, 102, 241, 0.15);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(129, 140, 248, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #a5b4fc;
            font-size: 14px;
            font-weight: 700;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(129, 140, 248, 0.3);
            border-radius: 10px;            color: #e0e7ff;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            outline: none;
        }
        textarea { min-height: 150px; resize: vertical; }
        input:focus, textarea:focus {
            border-color: rgba(129, 140, 248, 0.6);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }
        .btn-primary {
            background: #6366f1;
            color: #e0e7ff;
        }
        .btn-primary:hover { background: #4f46e5; }
        .btn-secondary {
            background: rgba(129, 140, 248, 0.3);
            color: #e0e7ff;
        }
        .btn-secondary:hover { background: rgba(129, 140, 248, 0.5); }
        .flash {
            padding: 12px;
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="edit-container">        <h1>تعديل الشخصية</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>اسم الشخصية</label>
                <input type="text" name="name" value="{{ character.name }}" required>
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <input type="text" name="description" value="{{ character.description }}" required>
            </div>
            <div class="form-group">
                <label>البرومبت (System Prompt)</label>
                <textarea name="prompt" required>{{ character.prompt }}</textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">حفظ التعديلات</button>
                <a href="/admin" class="btn btn-secondary">إلغاء</a>
            </div>
        </form>
    </div>
</body>
</html>
