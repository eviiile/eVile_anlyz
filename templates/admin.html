<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - EVILE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e7ff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(30, 27, 75, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section {
            background: rgba(30, 27, 75, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 700;            margin-bottom: 20px;
            color: #a5b4fc;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #c7d2fe;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 27, 75, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            color: #e0e7ff;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="url"]:focus,
        textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;            font-size: 14px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }
        
        .btn-secondary {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .character-card {
            background: rgba(30, 27, 75, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        
        .character-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .character-avatar {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(99, 102, 241, 0.5);        }
        
        .character-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        
        .character-description {
            color: #a5b4fc;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .character-prompt {
            background: rgba(30, 27, 75, 0.6);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #c7d2fe;
            margin-bottom: 15px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .character-actions {
            display: flex;
            gap: 10px;
        }
        
        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .edit-modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #a5b4fc;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #fff;
        }
        
        .notification-item {
            background: rgba(30, 27, 75, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .notification-title {            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .notification-text {
            color: #a5b4fc;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>لوحة التحكم - EVILE</h1>
            <button class="btn btn-secondary" onclick="window.location.href='/'">العودة للرئيسية</button>
        </div>

        <!-- قسم إضافة شخصية جديدة -->
        <div class="section">
            <h2 class="section-title">➕ إضافة شخصية جديدة</h2>
            <form id="addCharacterForm">
                <div class="form-group">
                    <label>اسم الشخصية</label>
                    <input type="text" id="charName" required placeholder="مثال: مصمم الشعارات">
                </div>
                <div class="form-group">
                    <label>رابط الصورة</label>
                    <input type="url" id="charImage" placeholder="https://example.com/logo.png">
                </div>
                <div class="form-group">
                    <label>وصف مختصر</label>
                    <input type="text" id="charDesc" required placeholder="وصف قصير للشخصية">
                </div>
                <div class="form-group">
                    <label>البرومبت (System Prompt)</label>
                    <textarea id="charPrompt" required placeholder="أدخل البرومبت الخاص بالشخصية..."></textarea>
                </div>
                <button type="submit" class="btn">إضافة شخصية</button>
            </form>
        </div>

        <!-- قسم عرض الشخصيات الحالية -->
        <div class="section">
            <h2 class="section-title">👥 الشخصيات الحالية</h2>
            <div id="charactersList" class="characters-grid">
                <!-- سيتم ملء هذا القسم بالجافاسكريبت -->
            </div>
        </div>

        <!-- قسم الإشعارات -->        <div class="section">
            <h2 class="section-title">🔔 إرسال إشعار</h2>
            <form id="notificationForm">
                <div class="form-group">
                    <label>عنوان الإشعار</label>
                    <input type="text" id="notifTitle" required>
                </div>
                <div class="form-group">
                    <label>نص الإشعار</label>
                    <textarea id="notifText" required></textarea>
                </div>
                <button type="submit" class="btn">إرسال إشعار</button>
            </form>
            
            <h3 style="margin-top: 30px; margin-bottom: 15px; color: #a5b4fc;">الإشعارات المرسلة</h3>
            <div id="notificationsList">
                <!-- سيتم ملء هذا القسم بالجافاسكريبت -->
            </div>
        </div>
    </div>

    <!-- نافذة التعديل -->
    <div id="editModal" class="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">تعديل الشخصية</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editCharacterForm">
                <input type="hidden" id="editCharId">
                <div class="form-group">
                    <label>اسم الشخصية</label>
                    <input type="text" id="editCharName" required>
                </div>
                <div class="form-group">
                    <label>رابط الصورة</label>
                    <input type="url" id="editCharImage">
                </div>
                <div class="form-group">
                    <label>وصف مختصر</label>
                    <input type="text" id="editCharDesc" required>
                </div>
                <div class="form-group">
                    <label>البرومبت (System Prompt)</label>
                    <textarea id="editCharPrompt" required></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn">حفظ التعديلات</button>
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">إلغاء</button>
                </div>            </form>
        </div>
    </div>

    <script>
        // بيانات تجريبية (يمكن استبدالها بـ API)
        let characters = [
            {
                id: 1,
                name: 'مصمم الشعارات',
                image: 'https://i.ibb.co/XZ3SRWQN/x.jpg',
                description: 'أدخل "الاسم + العنصر" وسأصمم شعاراً فريداً',
                prompt: 'Act as a professional logo designer...'
            },
            {
                id: 2,
                name: 'كاتب المحتوى',
                image: 'https://i.ibb.co/wNwDgkmV/x.png',
                description: 'كاتب محترف لقنوات تيليجرام',
                prompt: 'أنت كاتب محتوى محترف...'
            }
        ];

        let notifications = [];

        // تحميل الشخصيات عند بدء التشغيل
        document.addEventListener('DOMContentLoaded', () => {
            loadCharacters();
            loadNotifications();
        });

        // عرض الشخصيات
        function loadCharacters() {
            const container = document.getElementById('charactersList');
            container.innerHTML = '';

            if (characters.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #a5b4fc; grid-column: 1/-1;">لا توجد شخصيات بعد</p>';
                return;
            }

            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.innerHTML = `
                    <div class="character-header">
                        <img src="${char.image || 'https://via.placeholder.com/60'}" alt="${char.name}" class="character-avatar">
                        <div class="character-name">${char.name}</div>
                    </div>
                    <div class="character-description">${char.description}</div>                    <div class="character-prompt">${char.prompt.substring(0, 100)}...</div>
                    <div class="character-actions">
                        <button class="btn" onclick="editCharacter(${char.id})">تعديل</button>
                        <button class="btn btn-danger" onclick="deleteCharacter(${char.id})">حذف</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // إضافة شخصية جديدة
        document.getElementById('addCharacterForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newChar = {
                id: Date.now(),
                name: document.getElementById('charName').value,
                image: document.getElementById('charImage').value,
                description: document.getElementById('charDesc').value,
                prompt: document.getElementById('charPrompt').value
            };

            characters.push(newChar);
            loadCharacters();
            
            // إعادة تعيين النموذج
            e.target.reset();
            
            alert('تم إضافة الشخصية بنجاح!');
        });

        // تعديل شخصية
        function editCharacter(id) {
            const char = characters.find(c => c.id === id);
            if (!char) return;

            document.getElementById('editCharId').value = char.id;
            document.getElementById('editCharName').value = char.name;
            document.getElementById('editCharImage').value = char.image || '';
            document.getElementById('editCharDesc').value = char.description;
            document.getElementById('editCharPrompt').value = char.prompt;

            document.getElementById('editModal').classList.add('active');
        }

        // حفظ التعديلات
        document.getElementById('editCharacterForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const id = parseInt(document.getElementById('editCharId').value);            const index = characters.findIndex(c => c.id === id);
            
            if (index !== -1) {
                characters[index] = {
                    ...characters[index],
                    name: document.getElementById('editCharName').value,
                    image: document.getElementById('editCharImage').value,
                    description: document.getElementById('editCharDesc').value,
                    prompt: document.getElementById('editCharPrompt').value
                };
                
                loadCharacters();
                closeEditModal();
                alert('تم تعديل الشخصية بنجاح!');
            }
        });

        // حذف شخصية
        function deleteCharacter(id) {
            if (confirm('هل أنت متأكد من حذف هذه الشخصية؟')) {
                characters = characters.filter(c => c.id !== id);
                loadCharacters();
                alert('تم حذف الشخصية بنجاح!');
            }
        }

        // إغلاق نافذة التعديل
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // إرسال إشعار
        document.getElementById('notificationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const notification = {
                id: Date.now(),
                title: document.getElementById('notifTitle').value,
                text: document.getElementById('notifText').value,
                time: new Date().toLocaleString('ar-SA')
            };

            notifications.unshift(notification);
            loadNotifications();
            
            e.target.reset();
            alert('تم إرسال الإشعار بنجاح!');
        });

        // عرض الإشعارات        function loadNotifications() {
            const container = document.getElementById('notificationsList');
            container.innerHTML = '';

            if (notifications.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #a5b4fc;">لا توجد إشعارات بعد</p>';
                return;
            }

            notifications.forEach(notif => {
                const item = document.createElement('div');
                item.className = 'notification-item';
                item.innerHTML = `
                    <div class="notification-title">${notif.title} <small style="color: #818cf8;">(${notif.time})</small></div>
                    <div class="notification-text">${notif.text}</div>
                `;
                container.appendChild(item);
            });
        }

        // إغلاق النافذة عند النقر خارجها
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
