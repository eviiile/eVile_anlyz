<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - EVILE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(120,120,120,0.1) 0%, transparent 60%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(20,20,30,0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(150,150,150,0.3);
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            transition: transform 0.3s ease;
        }
        .login-card:hover { transform: translateY(-5px); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #6b7280, #4b5563);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .logo-icon i { font-size: 36px; color: white; }
        h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #eee, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: #aaa; font-size: 14px; text-align: center; }
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; color: #bbb; font-weight: 500; font-size: 14px; }
        input {
            width: 100%; padding: 14px 18px;
            background: rgba(30,30,45,0.6);
            border: 1px solid rgba(150,150,150,0.3);
            border-radius: 16px;
            color: #eee;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #aaa;
            background: rgba(30,30,45,0.8);
        }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6b7280, #4b5563);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .flash {
            padding: 12px;
            background: rgba(200,50,50,0.15);
            border: 1px solid rgba(200,50,50,0.5);
            border-radius: 14px;
            color: #fca5a5;
            margin-bottom: 24px;
            text-align: center;
            font-size: 14px;
        }
        @media (max-width: 480px) { .login-card { padding: 32px 24px; } h1 { font-size: 24px; } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon"><i class="bi bi-shield-lock"></i></div>
            <h1>لوحة التحكم</h1>
            <div class="subtitle">EVILE Admin Panel</div>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label><i class="bi bi-key"></i> كلمة المرور</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">دخول</button>
        </form>
    </div>
</body>
</html>
