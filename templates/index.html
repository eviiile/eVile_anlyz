<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EVILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
            touch-action: manipulation;
        }
        .bg-animation {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
            background: radial-gradient(circle at 20% 80%, rgba(120,120,120,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(80,80,80,0.08) 0%, transparent 50%);
            filter: blur(80px);
        }
        .main-container { width: 100%; height: 100vh; height: 100dvh; display: flex; flex-direction: column; padding: 12px; padding-top: 70px; }
        
        .floating-header {
            position: fixed; top: 12px; left: 12px; right: 12px; z-index: 100;
            display: flex; align-items: center; justify-content: space-between; padding: 6px;
            background: rgba(20,20,30,0.85); backdrop-filter: blur(25px);
            border: 1px solid rgba(150,150,150,0.3); border-radius: 18px; gap: 6px;
        }
        .header-circle {
            width: 40px; height: 40px; border-radius: 12px; background: rgba(40,40,55,0.6);
            border: 1px solid rgba(150,150,150,0.4); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; flex-shrink: 0; position: relative;
        }
        .header-circle:active { transform: scale(0.9); background: rgba(80,80,100,0.7); }
        .header-circle i { font-size: 20px; color: #ccc; }
        .header-circle .notif-badge {
            position: absolute; top: -3px; right: -3px; width: 16px; height: 16px; background: #666;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: bold; color: #fff; border: 2px solid #0a0a0a;
        }
        .logo-wrapper { flex: 1; display: flex; align-items: center; gap: 6px; }
        .logo-center {
            flex: 1; height: 40px; background: rgba(30,30,45,0.5);
            border: 1px solid rgba(150,150,150,0.3); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-text {
            font-size: 20px; font-weight: 900;
            background: linear-gradient(135deg, #eee, #aaa);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; letter-spacing: 3px;
        }
        .active-users-box {
            height: 40px; padding: 0 10px; background: rgba(100,100,100,0.2);
            border: 1px solid rgba(150,150,150,0.4); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            font-size: 11px; font-weight: 700; color: #bbb; white-space: nowrap;
        }
        .active-users-box i { font-size: 14px; color: #bbb; }

        /* Splash Screen */
        .splash-section {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            overflow-y: auto;
        }
        .splash-section.active { display: flex; }
        .splash-icon {
            width: 100px;
            height: 100px;
            background: rgba(80,80,100,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: pulse 2s infinite;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(150,150,150,0.3);
        }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } }
        .splash-icon i { font-size: 56px; color: #ccc; }
        .splash-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #eee, #aaa);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        .splash-text {
            font-size: 16px;
            color: #bbb;
            max-width: 280px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .splash-input-wrapper {
            width: 100%;
            max-width: 320px;
            display: flex;
            gap: 12px;
            background: rgba(20,20,35,0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(150,150,150,0.3);
            border-radius: 48px;
            padding: 6px 6px 6px 16px;
            align-items: center;
        }
        .splash-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            color: #eee;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            outline: none;
        }
        .splash-input::placeholder { color: #888; font-size: 14px; }
        .splash-btn {
            width: 48px;
            height: 48px;
            border-radius: 40px;
            background: linear-gradient(135deg, #6b7280, #4b5563);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .splash-btn:active { transform: scale(0.94); }
        .splash-btn i { font-size: 24px; color: white; }
        .splash-error {
            margin-top: 16px;
            font-size: 12px;
            color: #fca5a5;
            background: rgba(200,50,50,0.15);
            border-radius: 40px;
            padding: 8px 16px;
        }

        /* Main Welcome */
        .welcome-section {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-align: center;
            overflow-y: auto;
        }
        .welcome-section.active { display: flex; }
        .character-logo {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid rgba(150,150,150,0.5);
            background: rgba(30,30,45,0.5);
        }
        .sparkle-icon { width: 60px; height: 60px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .sparkle-icon i { font-size: 60px; color: #aaa; }
        .welcome-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #eee, #aaa);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
        }
        .welcome-subtitle {
            font-size: 12px;
            color: #aaa;
            max-width: 260px;
            line-height: 1.4;
            margin-bottom: 16px;
        }
        .welcome-input-card {
            width: 100%;
            max-width: 320px;
            margin-bottom: 8px;
        }
        .input-card {
            background: rgba(20,20,35,0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(150,150,150,0.3);
            border-radius: 18px;
            padding: 6px 6px 6px 12px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            color: #eee;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            outline: none;
        }
        .message-input::placeholder { color: #888; }
        .send-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6b7280, #4b5563);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .send-btn:disabled { opacity: 0.5; }
        .send-btn:active:not(:disabled) { transform: scale(0.94); }
        .send-btn i { font-size: 18px; color: white; }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Character scroll - centering when few items */
        .char-scroll-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin: 8px auto 12px;
        }
        .char-scroll-wrapper {
            overflow-x: auto;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        /* Center the buttons if they don't overflow */
        .char-scroll-wrapper:not(.overflowing) {
            display: flex;
            justify-content: center;
        }
        .char-scroll-wrapper:not(.overflowing) .char-selector {
            justify-content: center;
        }
        .char-selector {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            width: max-content;
        }
        .char-selector-btn {
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(30,30,45,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(150,150,150,0.3);
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-size: 11px;
        }
        .char-selector-btn.active {
            background: rgba(100,100,130,0.5);
            border-color: #aaa;
        }
        .char-selector-btn i { font-size: 14px; color: #ccc; }
        .char-selector-name {
            font-size: 11px;
            font-weight: 500;
            color: #ddd;
        }

        /* Chat Section */
        .chat-section {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-section.active { display: flex; }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(20,20,35,0.6);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(150,150,150,0.3);
        }
        .message { margin-bottom: 10px; animation: messageSlide 0.3s ease; }
        @keyframes messageSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-time { font-size: 9px; color: #999; margin-bottom: 3px; }
        .message-content {
            background: rgba(30,30,45,0.6);
            border: 1px solid rgba(150,150,150,0.3);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            color: #ddd;
            max-width: 85%;
        }
        .message.own { text-align: left; }
        .message.own .message-content {
            background: rgba(70,70,90,0.7);
            border-color: rgba(180,180,180,0.4);
            margin-right: auto;
            margin-left: 0;
        }
        .ai-bubble {
            background: rgba(30,30,45,0.7);
            border: 1px solid rgba(150,150,150,0.3);
            border-radius: 12px;
            overflow: hidden;
            max-width: 85%;
        }
        .ai-bubble-label {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px 0;
            font-size: 9px;
            font-weight: 700;
            color: #aaa;
        }
        .ai-bubble-label i { font-size: 11px; color: #aaa; }
        .ai-bubble-text { padding: 4px 10px 8px; font-size: 12px; line-height: 1.5; color: #ddd; word-wrap: break-word; }
        .ai-bubble-copy {
            height: 26px;
            background: rgba(40,40,55,0.6);
            border-top: 1px solid rgba(150,150,150,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(-5px);
            gap: 4px;
        }
        .ai-bubble-copy.visible { opacity: 1; transform: translateY(0); }
        .ai-bubble-copy:active { background: rgba(80,80,100,0.7); }
        .ai-bubble-copy.copied { background: rgba(100,100,100,0.4); }
        .copy-icon { font-size: 12px; color: #ccc; }
        .copy-text { color: #ccc; font-size: 10px; font-weight: 700; }

        .input-section { padding: 6px 0; flex-shrink: 0; }
        .chat-section .input-card {
            background: rgba(20,20,35,0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(150,150,150,0.3);
            border-radius: 18px;
            padding: 8px 10px;
        }
        .home-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: rgba(40,40,55,0.6);
            border: 1px solid rgba(150,150,150,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .home-btn:active { transform: scale(0.9); background: rgba(80,80,100,0.7); }
        .home-btn i { font-size: 18px; color: #ccc; }

        /* Bottom Sheets */
        .bottom-sheet-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .bottom-sheet-overlay.active { display: flex; }
        .bottom-sheet {
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            background: rgba(15,15,25,0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(150,150,150,0.3);
            border-radius: 25px 25px 0 0;
            padding: 20px;
            animation: slideUp 0.4s ease;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(150,150,150,0.3);
        }
        .sheet-title {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ddd;
        }
        .sheet-title i { font-size: 18px; color: #aaa; }
        .sheet-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(40,40,55,0.6);
            border: 1px solid rgba(150,150,150,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .sheet-close i { font-size: 16px; color: #ccc; }
        .sheet-instruction {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin-bottom: 16px;
            padding: 6px;
            background: rgba(30,30,45,0.5);
            border-radius: 30px;
        }
        .characters-list, .notifications-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            max-height: 50vh;
        }
        .char-list-item, .notif-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(30,30,45,0.6);
            border: 1px solid rgba(150,150,150,0.3);
            border-radius: 16px;
            width: 100%;
        }
        .char-list-icon, .notif-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(40,40,55,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .char-list-icon i, .notif-icon i { font-size: 20px; color: #ccc; }
        .char-list-info, .notif-content {
            flex: 1;
            text-align: right;
        }
        .char-list-name, .notif-title {
            font-size: 13px;
            font-weight: 700;
            color: #eee;
            margin-bottom: 2px;
        }
        .char-list-desc, .notif-text {
            font-size: 10px;
            color: #aaa;
            line-height: 1.3;
        }
        .char-list-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(40,40,55,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }
        .char-list-item.active .char-list-check {
            opacity: 1;
            background: #6b7280;
        }
        .char-list-check i { font-size: 12px; color: white; }

        @media (min-width: 768px) {
            .main-container { max-width: 700px; margin: 0 auto; padding: 20px; padding-top: 80px; }
            .floating-header { left: 20px; right: 20px; top: 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <header class="floating-header">
        <div class="header-circle" onclick="openCharactersSheet()">
            <i class="bi bi-people"></i>
        </div>
        <div class="logo-wrapper">
            <div class="logo-center"><span class="logo-text">EVILE</span></div>
            <div class="active-users-box">
                <i class="bi bi-person-friends"></i>
                <span id="activeCount">0</span>
            </div>
        </div>
        <div class="header-circle" onclick="openNotificationsSheet()">
            <i class="bi bi-bell"></i>
            <span class="notif-badge" id="notifBadge" style="display: none;">0</span>
        </div>
    </header>

    <div class="main-container">
        <!-- Splash screen -->
        <div class="splash-section" id="splashSection">
            <div class="splash-icon">
                <i class="bi bi-robot"></i>
            </div>
            <div class="splash-title">اشتراك إجباري</div>
            <div class="splash-text">ندعوك للانضمام إلى قناتنا على تليجرام لتتمكن من الوصول إلى موقعنا الخاص وتجربة أدوات توليد المحتوى</div>
            <div class="splash-input-wrapper">
                <input type="text" id="splashTelegramId" class="splash-input" placeholder="معرف تيليجرام (أرقام فقط)" autocomplete="off">
                <button id="splashRegisterBtn" class="splash-btn">
                    <i class="bi bi-arrow-left"></i>
                </button>
            </div>
            <div id="splashError" class="splash-error" style="display: none;"></div>
        </div>

        <!-- الواجهة الرئيسية -->
        <div class="welcome-section" id="welcomeSection">
            <div id="welcomeLogo">
                <div class="sparkle-icon">
                    <i class="bi bi-stars"></i>
                </div>
            </div>
            <h1 class="welcome-title" id="welcomeTitle">ابنِ أفكارك مع EVILE</h1>
            <p class="welcome-subtitle" id="welcomeSubtitle">اختر شخصية وابدأ محادثة إبداعية</p>

            <div class="welcome-input-card">
                <div class="input-card">
                    <div class="input-wrapper">
                        <input type="text" class="message-input" id="welcomeInput" placeholder="اكتب رسالتك..." onkeypress="handleWelcomeKey(event)">
                        <button class="send-btn" id="welcomeSendBtn" onclick="sendWelcomeMessage()">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- أزرار الشخصيات -->
            <div class="char-scroll-container">
                <div class="char-scroll-wrapper" id="charScrollWrapper">
                    <div class="char-selector" id="charSelector"></div>
                </div>
            </div>
        </div>

        <!-- واجهة الدردشة -->
        <div class="chat-section" id="chatSection">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-section">
                <div class="input-card">
                    <div class="input-wrapper">
                        <button class="home-btn" onclick="goHome()" title="العودة للقائمة الرئيسية">
                            <i class="bi bi-house-door"></i>
                        </button>
                        <input type="text" class="message-input" id="chatInput" placeholder="اكتب رسالتك..." onkeypress="handleChatKey(event)">
                        <button class="send-btn" id="sendBtn" onclick="sendChatMessage()">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة الشخصيات -->
    <div class="bottom-sheet-overlay" id="charactersSheet" onclick="closeSheetOnBackdrop(event, 'charactersSheet')">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-header">
                <div class="sheet-title"><i class="bi bi-people"></i> الشخصيات</div>
                <button class="sheet-close" onclick="closeSheet('charactersSheet')"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="sheet-instruction">اختر الشخصية المناسبة لمحادثتك</div>
            <div id="charactersList" class="characters-list"></div>
        </div>
    </div>

    <!-- نافذة الإشعارات -->
    <div class="bottom-sheet-overlay" id="notificationsSheet" onclick="closeSheetOnBackdrop(event, 'notificationsSheet')">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-header">
                <div class="sheet-title"><i class="bi bi-bell"></i> الإشعارات</div>
                <button class="sheet-close" onclick="closeSheet('notificationsSheet')"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="notificationsList" class="notifications-list"></div>
        </div>
    </div>

    <script>
        const characters = {{ characters|tojson }};
        const notifications = {{ notifications|tojson }};
        let telegramId = {{ telegram_id|tojson }};
        
        let currentCharacter = characters.length > 0 ? characters[0].callback_key : 'logo_maker';
        let isFirstMessage = true;
        let isProcessing = false;
        let pendingMessage = null;

        const splashSection = document.getElementById('splashSection');
        const welcomeSection = document.getElementById('welcomeSection');
        const chatSection = document.getElementById('chatSection');
        const charScrollWrapper = document.getElementById('charScrollWrapper');

        function initScreen() {
            if (telegramId) {
                splashSection.classList.remove('active');
                welcomeSection.classList.add('active');
                chatSection.classList.remove('active');
                document.getElementById('welcomeInput').placeholder = 'اكتب رسالتك...';
            } else {
                splashSection.classList.add('active');
                welcomeSection.classList.remove('active');
                chatSection.classList.remove('active');
            }
        }

        function updateActiveUsers() {
            fetch('/api/active_users')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('activeCount').textContent = data.count;
                })
                .catch(() => {});
        }

        function renderCharSelector() {
            const selector = document.getElementById('charSelector');
            selector.innerHTML = characters.map(char => `
                <div class="char-selector-btn ${char.callback_key === currentCharacter ? 'active' : ''}" data-key="${char.callback_key}">
                    <i class="bi bi-robot"></i>
                    <span class="char-selector-name">${char.name}</span>
                </div>
            `).join('');
            
            // Check if overflowing and add class for centering
            if (charScrollWrapper) {
                const isOverflowing = selector.scrollWidth > charScrollWrapper.clientWidth;
                if (isOverflowing) {
                    charScrollWrapper.classList.add('overflowing');
                    charScrollWrapper.classList.remove('centered');
                } else {
                    charScrollWrapper.classList.remove('overflowing');
                    charScrollWrapper.classList.add('centered');
                    // Force center using flex
                    charScrollWrapper.style.display = 'flex';
                    charScrollWrapper.style.justifyContent = 'center';
                }
            }
            
            document.querySelectorAll('.char-selector-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const key = btn.getAttribute('data-key');
                    if (key) selectCharacter(key);
                });
            });
            if (charScrollWrapper && charScrollWrapper.classList.contains('overflowing')) {
                charScrollWrapper.addEventListener('scrollend', () => snapToNearest());
            }
        }

        function snapToNearest() {
            if (!charScrollWrapper || !charScrollWrapper.classList.contains('overflowing')) return;
            const container = charScrollWrapper;
            const buttons = document.querySelectorAll('.char-selector-btn');
            if (buttons.length === 0) return;
            const containerCenter = container.scrollLeft + container.clientWidth / 2;
            let nearest = null;
            let minDistance = Infinity;
            buttons.forEach(btn => {
                const btnCenter = btn.offsetLeft + btn.offsetWidth / 2;
                const distance = Math.abs(btnCenter - containerCenter);
                if (distance < minDistance) {
                    minDistance = distance;
                    nearest = btn;
                }
            });
            if (nearest) {
                const scrollTo = nearest.offsetLeft - (container.clientWidth / 2) + (nearest.offsetWidth / 2);
                container.scrollTo({ left: scrollTo, behavior: 'smooth' });
            }
        }

        function updateWelcomeDisplay() {
            const char = characters.find(c => c.callback_key === currentCharacter);
            const logoContainer = document.getElementById('welcomeLogo');
            const title = document.getElementById('welcomeTitle');
            const subtitle = document.getElementById('welcomeSubtitle');
            if (char) {
                if (char.logo_url) {
                    logoContainer.innerHTML = `<img src="${char.logo_url}" class="character-logo" alt="${char.name}">`;
                } else {
                    logoContainer.innerHTML = `<div class="sparkle-icon"><i class="bi bi-stars"></i></div>`;
                }
                title.textContent = char.name;
                subtitle.textContent = char.description;
            }
        }

        function renderCharactersSheet() {
            const list = document.getElementById('charactersList');
            list.innerHTML = characters.map(char => `
                <div class="char-list-item ${char.callback_key === currentCharacter ? 'active' : ''}" onclick="selectCharacter('${char.callback_key}')">
                    <div class="char-list-icon"><i class="bi bi-robot"></i></div>
                    <div class="char-list-info">
                        <div class="char-list-name">${char.name}</div>
                        <div class="char-list-desc">${char.description}</div>
                    </div>
                    <div class="char-list-check"><i class="bi bi-check-lg"></i></div>
                </div>
            `).join('');
        }

        function renderNotificationsSheet() {
            const list = document.getElementById('notificationsList');
            const badge = document.getElementById('notifBadge');
            if (notifications.length === 0) {
                list.innerHTML = '<div class="notif-item" style="justify-content: center; text-align: center;">لا توجد إشعارات</div>';
                badge.style.display = 'none';
                return;
            }
            badge.textContent = notifications.length;
            badge.style.display = 'flex';
            list.innerHTML = notifications.map(notif => `
                <div class="notif-item">
                    <div class="notif-icon"><i class="bi bi-bell"></i></div>
                    <div class="notif-content">
                        <div class="notif-title">${notif.title}</div>
                        <div class="notif-text">${notif.text}</div>
                        <div class="notif-time">${notif.created_at}</div>
                    </div>
                </div>
            `).join('');
        }

        function setButtonLoading(btn, loading) {
            if (!btn) return;
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<div class="spinner"></div>';
            } else {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send"></i>';
            }
        }

        function showSplashError(msg) {
            const errDiv = document.getElementById('splashError');
            errDiv.textContent = msg;
            errDiv.style.display = 'block';
            setTimeout(() => errDiv.style.display = 'none', 4000);
        }

        async function performSplashRegister() {
            const idInput = document.getElementById('splashTelegramId');
            const id = idInput.value.trim();
            if (!/^\d+$/.test(id)) {
                showSplashError('المعرف يجب أن يحتوي على أرقام فقط');
                return;
            }
            const btn = document.getElementById('splashRegisterBtn');
            setButtonLoading(btn, true);
            try {
                let res = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `telegram_id=${id}`
                });
                let data = await res.json();
                setButtonLoading(btn, false);
                if (data.success) {
                    telegramId = id;
                    if (data.subscribed) {
                        location.reload();
                    } else {
                        showInlineSubscription(id);
                    }
                } else {
                    showSplashError(data.message || 'فشل التسجيل');
                }
            } catch (err) {
                setButtonLoading(btn, false);
                showSplashError('خطأ في الاتصال');
            }
        }

        function showInlineSubscription(existingId) {
            const wrapper = document.querySelector('.splash-input-wrapper');
            wrapper.innerHTML = `
                <input type="text" id="subTelegramId" class="splash-input" value="${existingId}" readonly disabled style="opacity:0.7;">
                <button id="subscribeBtn" class="splash-btn" style="background: linear-gradient(135deg, #6b7280, #4b5563);">
                    <i class="bi bi-telegram"></i>
                </button>
                <button id="verifySubBtn" class="splash-btn" style="background: rgba(80,80,100,0.6);">
                    <i class="bi bi-check-lg"></i>
                </button>
            `;
            document.getElementById('subscribeBtn').onclick = () => { window.open('{{ channel_url }}', '_blank'); };
            document.getElementById('verifySubBtn').onclick = () => verifySubscriptionAndProceed();
        }

        async function verifySubscriptionAndProceed() {
            const btn = document.getElementById('verifySubBtn');
            setButtonLoading(btn, true);
            try {
                let res = await fetch('/api/verify_subscription', { method: 'POST' });
                let data = await res.json();
                setButtonLoading(btn, false);
                if (data.success) {
                    location.reload();
                } else {
                    showSplashError('لم يتم الاشتراك بعد. تأكد من الاشتراك ثم اضغط تحقق.');
                }
            } catch (err) {
                setButtonLoading(btn, false);
                showSplashError('خطأ في التحقق');
            }
        }

        function addMessage(text, isOwn) {
            const container = document.getElementById('messagesContainer');
            const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            div.innerHTML = `<div class="message-time">${time}</div><div class="message-content">${escapeHtml(text)}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showLoading() {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.id = 'loadingMessage';
            div.className = 'message';
            div.innerHTML = '<div class="loading-container"><div class="loading-spinner"></div></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeLoading() {
            const el = document.getElementById('loadingMessage');
            if (el) el.remove();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function streamResponse(text) {
            return new Promise((resolve) => {
                const container = document.getElementById('messagesContainer');
                const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `<div class="message-time">${time}</div>`;
                container.appendChild(msgDiv);
                const bubble = document.createElement('div');
                bubble.className = 'ai-bubble';
                bubble.innerHTML = `
                    <div class="ai-bubble-label"><i class="bi bi-cpu"></i> AI</div>
                    <div class="ai-bubble-text"></div>
                    <div class="ai-bubble-copy"><i class="bi bi-files copy-icon"></i><span class="copy-text">نسخ</span></div>
                `;
                msgDiv.appendChild(bubble);
                const textEl = bubble.querySelector('.ai-bubble-text');
                const copyBtn = bubble.querySelector('.ai-bubble-copy');
                copyBtn.onclick = () => copyBubbleContent(copyBtn, textEl.textContent);
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                textEl.appendChild(cursor);
                let idx = 0;
                const interval = setInterval(() => {
                    if (idx < text.length) {
                        const span = document.createElement('span');
                        span.textContent = text.charAt(idx);
                        textEl.insertBefore(span, cursor);
                        idx++;
                        container.scrollTop = container.scrollHeight;
                    } else {
                        clearInterval(interval);
                        cursor.remove();
                        setTimeout(() => copyBtn.classList.add('visible'), 100);
                        resolve();
                    }
                }, 12);
            });
        }

        function copyBubbleContent(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                button.classList.add('copied');
                button.innerHTML = '<i class="bi bi-check-lg copy-icon"></i><span class="copy-text">تم النسخ</span>';
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.innerHTML = '<i class="bi bi-files copy-icon"></i><span class="copy-text">نسخ</span>';
                }, 1500);
            });
        }

        async function sendWelcomeMessage() {
            if (isProcessing) return;
            const input = document.getElementById('welcomeInput');
            const msg = input.value.trim();
            if (!msg) return;
            if (isFirstMessage) {
                const btn = document.getElementById('welcomeSendBtn');
                setButtonLoading(btn, true);
                try {
                    const subCheck = await fetch('/api/verify_subscription', { method: 'POST' }).then(r => r.json());
                    setButtonLoading(btn, false);
                    if (!subCheck.success) {
                        showInlineSubscription(telegramId);
                        return;
                    }
                } catch (err) {
                    setButtonLoading(btn, false);
                    addMessage('خطأ في التحقق من الاشتراك', false);
                    return;
                }
                welcomeSection.classList.remove('active');
                chatSection.classList.add('active');
                isFirstMessage = false;
            }
            isProcessing = true;
            const sendBtn = document.getElementById('welcomeSendBtn');
            setButtonLoading(sendBtn, true);
            addMessage(msg, true);
            input.value = '';
            showLoading();
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character: currentCharacter, message: msg })
                });
                const data = await res.json();
                removeLoading();
                if (data.response) {
                    await streamResponse(data.response);
                } else {
                    addMessage('حدث خطأ في المعالجة', false);
                }
            } catch (err) {
                removeLoading();
                addMessage('خطأ في الاتصال', false);
            }
            isProcessing = false;
            setButtonLoading(sendBtn, false);
        }

        async function sendChatMessage() {
            if (isProcessing) return;
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            isProcessing = true;
            const sendBtn = document.getElementById('sendBtn');
            setButtonLoading(sendBtn, true);
            addMessage(msg, true);
            input.value = '';
            showLoading();
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character: currentCharacter, message: msg })
                });
                const data = await res.json();
                removeLoading();
                if (data.response) {
                    await streamResponse(data.response);
                } else {
                    addMessage('حدث خطأ في المعالجة', false);
                }
            } catch (err) {
                removeLoading();
                addMessage('خطأ في الاتصال', false);
            }
            isProcessing = false;
            setButtonLoading(sendBtn, false);
        }

        function handleWelcomeKey(e) { if (e.key === 'Enter' && !isProcessing) sendWelcomeMessage(); }
        function handleChatKey(e) { if (e.key === 'Enter' && !isProcessing) sendChatMessage(); }

        function openCharactersSheet() { renderCharactersSheet(); document.getElementById('charactersSheet').classList.add('active'); }
        function openNotificationsSheet() { renderNotificationsSheet(); document.getElementById('notificationsSheet').classList.add('active'); document.getElementById('notifBadge').style.display = 'none'; }
        function closeSheet(id) { document.getElementById(id).classList.remove('active'); }
        function closeSheetOnBackdrop(e, id) { if (e.target === e.currentTarget) closeSheet(id); }
        function selectCharacter(key) {
            currentCharacter = key;
            renderCharSelector();
            renderCharactersSheet();
            updateWelcomeDisplay();
            closeSheet('charactersSheet');
            const char = characters.find(c => c.callback_key === key);
            if (char) {
                document.getElementById('welcomeInput').placeholder = `اكتب لـ ${char.name}...`;
                document.getElementById('chatInput').placeholder = `اكتب لـ ${char.name}...`;
            }
        }
        function goHome() {
            chatSection.classList.remove('active');
            welcomeSection.classList.add('active');
            document.getElementById('messagesContainer').innerHTML = '';
            isFirstMessage = true;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initScreen();
            updateActiveUsers();
            setInterval(updateActiveUsers, 30000);
            renderCharSelector();
            renderNotificationsSheet();
            updateWelcomeDisplay();
            document.getElementById('splashRegisterBtn').onclick = performSplashRegister;
            document.getElementById('splashTelegramId').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSplashRegister();
            });
        });
    </script>
</body>
</html>
