<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #050816;
            min-height: 100vh;
            min-height: 100dvh;
            color: #c7d2fe;
            overflow: hidden;
            touch-action: manipulation;
        }

        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 80%, rgba(30, 41, 89, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(49, 46, 129, 0.3) 0%, transparent 50%);
            filter: blur(80px);
            animation: bgPulse 15s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 { width: 300px; height: 300px; background: rgba(30, 41, 89, 0.3); top: -100px; right: -100px; }
        .orb-2 { width: 250px; height: 250px; background: rgba(49, 46, 129, 0.3); bottom: -50px; left: -50px; animation-delay: 5s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 30px) scale(0.9); }
        }

        .main-container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 12px;
            padding-top: 80px;
        }

        .floating-header {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px;
            background: rgba(15, 23, 60, 0.85);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(49, 46, 129, 0.5);
            border-radius: 18px;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .header-circle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(30, 41, 89, 0.6);
            border: 1px solid rgba(49, 46, 129, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            position: relative;
        }
        .header-circle:active { transform: scale(0.9); background: rgba(49, 46, 129, 0.8); }
        .header-circle i { font-size: 16px; color: #a5b4fc; }

        .header-circle .notif-badge {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 16px;
            height: 16px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
            color: #fff;
            border: 2px solid #050816;
        }

        .logo-center {
            flex: 1;
            height: 40px;
            background: rgba(30, 41, 89, 0.5);
            border: 1px solid rgba(49, 46, 129, 0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .welcome-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 15px;
            text-align: center;
            overflow-y: auto;
        }
        .welcome-section.hidden { display: none; }

        .sparkle-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 12px;
            animation: sparkleFloat 3s ease-in-out infinite;
        }

        .sparkle-icon svg { width: 100%; height: 100%; }

        @keyframes sparkleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-subtitle {
            font-size: 12px;
            color: #818cf8;
            max-width: 260px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .chat-section {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-section.active { display: flex; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(10, 15, 40, 0.6);
            backdrop-filter: blur(15px);            border-radius: 20px;
            border: 1px solid rgba(49, 46, 129, 0.3);
        }

        .message { margin-bottom: 14px; animation: messageSlide 0.4s ease; }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-time { font-size: 10px; color: #6366f1; margin-bottom: 5px; }

        .message-content {
            background: rgba(30, 41, 89, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(49, 46, 129, 0.4);
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.6;
            word-wrap: break-word;
            color: #c7d2fe;
        }

        .message.own { text-align: left; }
        .message.own .message-content {
            background: rgba(49, 46, 129, 0.6);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .ai-bubble {
            position: relative;
            background: rgba(20, 30, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(49, 46, 129, 0.4);
            border-radius: 14px;
            overflow: hidden;
        }

        .ai-bubble-label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px 0;
            font-size: 10px;
            font-weight: 700;
            color: #6366f1;
            letter-spacing: 1px;
        }
        .ai-bubble-label i { font-size: 11px; color: #818cf8; }

        .ai-bubble-text {
            padding: 6px 12px 10px;
            font-size: 13px;
            line-height: 1.6;
            color: #c7d2fe;
            word-wrap: break-word;
        }

        .ai-bubble-copy {
            position: relative;
            height: 30px;
            background: rgba(30, 41, 89, 0.6);
            border-top: 1px solid rgba(49, 46, 129, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(-5px);
            gap: 6px;
        }

        .ai-bubble-copy.visible { opacity: 1; transform: translateY(0); }
        .ai-bubble-copy:active { background: rgba(49, 46, 129, 0.8); transform: scale(0.98); }
        .ai-bubble-copy.copied { background: rgba(34, 197, 94, 0.3); }

        .copy-icon { color: #a5b4fc; font-size: 12px; }
        .copy-text { color: #a5b4fc; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }

        .input-section { padding: 8px 0; flex-shrink: 0; }

        .input-card {
            background: rgba(15, 23, 60, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(49, 46, 129, 0.5);
            border-radius: 20px;
            padding: 10px 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .input-wrapper { display: flex; align-items: center; gap: 8px; }

        .message-input {
            flex: 1;
            background: rgba(20, 30, 70, 0.6);
            border: 1px solid rgba(49, 46, 129, 0.4);            border-radius: 12px;
            padding: 10px 14px;
            color: #c7d2fe;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            outline: none;
        }

        .message-input::placeholder { color: #6366f1; }
        .message-input:focus { background: rgba(30, 41, 89, 0.6); border-color: rgba(99, 102, 241, 0.6); }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border: 1px solid rgba(99, 102, 241, 0.6);
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .send-btn:active { transform: scale(0.88); background: linear-gradient(135deg, #4338ca, #4f46e5); }
        .send-btn:disabled { opacity: 0.5; }

        .loading-container { display: flex; align-items: center; justify-content: center; padding: 20px; }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #6366f1;
            margin-right: 2px;
            animation: blink 0.8s infinite;            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .bottom-sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 8, 22, 0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .bottom-sheet-overlay.active { display: flex; }

        .bottom-sheet {
            width: 100%;
            max-width: 600px;
            max-height: 75vh;
            background: rgba(15, 23, 60, 0.95);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(49, 46, 129, 0.5);
            border-radius: 25px 25px 0 0;
            padding: 20px;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(49, 46, 129, 0.4);
        }
        .sheet-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e0e7ff;
        }

        .sheet-title i { color: #6366f1; }

        .sheet-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(30, 41, 89, 0.6);
            border: 1px solid rgba(49, 46, 129, 0.5);
            color: #a5b4fc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }

        .sheet-close:active { transform: scale(0.9); background: rgba(49, 46, 129, 0.8); }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(99, 102, 241, 0.5);
            border-radius: 4px;
            margin: 0 auto 15px;
        }

        .char-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(20, 30, 70, 0.5);
            border: 1px solid rgba(49, 46, 129, 0.4);
            border-radius: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: right;
        }
        .char-list-item:active { transform: scale(0.97); background: rgba(30, 41, 89, 0.7); }
        .char-list-item.active { background: rgba(49, 46, 129, 0.6); border-color: rgba(99, 102, 241, 0.6); }

        .char-list-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(30, 41, 89, 0.7);
            border: 1px solid rgba(49, 46, 129, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #a5b4fc;
            flex-shrink: 0;
        }

        .char-list-item.active .char-list-icon { background: #4f46e5; border-color: #6366f1; color: #fff; }

        .char-list-info { flex: 1; text-align: right; min-width: 0; }
        .char-list-name { font-size: 14px; font-weight: 700; color: #e0e7ff; margin-bottom: 3px; }
        .char-list-desc { font-size: 11px; color: #818cf8; line-height: 1.4; }

        .char-list-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(30, 41, 89, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #a5b4fc;
            opacity: 0;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .char-list-item.active .char-list-check { opacity: 1; background: #4f46e5; color: #fff; }

        .notif-item {
            background: rgba(20, 30, 70, 0.5);
            border: 1px solid rgba(49, 46, 129, 0.4);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .notif-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: #e0e7ff; display: flex; align-items: center; gap: 8px; }
        .notif-title i { color: #6366f1; font-size: 14px; }        .notif-text { font-size: 12px; color: #818cf8; line-height: 1.5; }
        .notif-time { font-size: 10px; color: #6366f1; margin-top: 6px; }

        @media (min-width: 768px) {
            .main-container { max-width: 700px; margin: 0 auto; padding: 20px; padding-top: 90px; }
            .floating-header { left: 20px; right: 20px; top: 20px; }
            .welcome-title { font-size: 30px; }
            .logo-text { font-size: 24px; }
            .header-circle { width: 44px; height: 44px; }
            .logo-center { height: 44px; }
        }

        @supports (padding: max(0px)) {
            .main-container {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
            .floating-header {
                top: max(12px, env(safe-area-inset-top));
                left: max(12px, env(safe-area-inset-left));
                right: max(12px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="floating-header">
        <div class="header-circle" onclick="openCharactersSheet()">
            <i class="fas fa-users"></i>
        </div>
        <div class="logo-center">
            <span class="logo-text">EVILE</span>
        </div>
        <div class="header-circle" onclick="openNotificationsSheet()">
            <i class="fas fa-bell"></i>
            <span class="notif-badge" id="notifBadge" style="display: none;">0</span>
        </div>
    </header>

    <div class="main-container">
        <div class="welcome-section" id="welcomeSection">
            <div class="sparkle-icon">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 5 L55 40 L90 45 L55 50 L50 85 L45 50 L10 45 L45 40 Z" 
                          fill="#6366f1" stroke="#a5b4fc" stroke-width="1.5" stroke-linejoin="round"/>                </svg>
            </div>
            <h1 class="welcome-title">ابنِ أفكارك مع EVILE</h1>
            <p class="welcome-subtitle">اضغط على أيقونة الشخصيات لاختيار شخصية وابدأ محادثة إبداعية</p>

            <div class="input-section" style="width: 100%; max-width: 340px;">
                <div class="input-card">
                    <div class="input-wrapper">
                        <input type="text" class="message-input" id="welcomeInput" placeholder="اكتب رسالتك..." onkeypress="handleWelcomeKey(event)">
                        <button class="send-btn" onclick="sendWelcomeMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-section" id="chatSection">
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="input-section">
                <div class="input-card">
                    <div class="input-wrapper">
                        <input type="text" class="message-input" id="chatInput" placeholder="اكتب رسالتك..." onkeypress="handleChatKey(event)">
                        <button class="send-btn" id="sendBtn" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-sheet-overlay" id="charactersSheet" onclick="closeSheetOnBackdrop(event, 'charactersSheet')">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <div class="sheet-title">
                    <i class="fas fa-users"></i>
                    الشخصيات
                </div>
                <button class="sheet-close" onclick="closeSheet('charactersSheet')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="charactersList"></div>
        </div>
    </div>

    <div class="bottom-sheet-overlay" id="notificationsSheet" onclick="closeSheetOnBackdrop(event, 'notificationsSheet')">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <div class="sheet-title">                    <i class="fas fa-bell"></i>
                    الإشعارات
                </div>
                <button class="sheet-close" onclick="closeSheet('notificationsSheet')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="notificationsList"></div>
        </div>
    </div>

    <script>
        const characters = {{ characters|tojson }};
        const notifications = {{ notifications|tojson }};
        
        let currentCharacter = characters.length > 0 ? characters[0].callback_key : 'logo_maker';
        let isFirstMessage = true;
        let isProcessing = false;

        function renderCharacters() {
            const list = document.getElementById('charactersList');
            list.innerHTML = characters.map(char => `
                <div class="char-list-item ${char.callback_key === currentCharacter ? 'active' : ''}" 
                     onclick="selectCharacter('${char.callback_key}')">
                    <div class="char-list-icon">
                        <i class="fas fa-${char.callback_key === 'logo_maker' ? 'palette' : 'pen-fancy'}"></i>
                    </div>
                    <div class="char-list-info">
                        <div class="char-list-name">${char.name}</div>
                        <div class="char-list-desc">${char.description}</div>
                    </div>
                    <div class="char-list-check">
                        <i class="fas fa-check"></i>
                    </div>
                </div>
            `).join('');
        }

        function renderNotifications() {
            const list = document.getElementById('notificationsList');
            const badge = document.getElementById('notifBadge');
            
            if (notifications.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #6366f1; padding: 40px 20px;"><i class="fas fa-bell-slash" style="font-size: 40px; opacity: 0.5; display: block; margin-bottom: 10px;"></i>لا توجد إشعارات</p>';
                badge.style.display = 'none';
                return;
            }
            
            badge.textContent = notifications.length;
            badge.style.display = 'flex';            
            list.innerHTML = notifications.map(notif => `
                <div class="notif-item">
                    <div class="notif-title">
                        <i class="fas fa-bell"></i>
                        ${notif.title}
                    </div>
                    <div class="notif-text">${notif.text}</div>
                    <div class="notif-time"><i class="fas fa-clock" style="margin-left: 4px;"></i>${notif.created_at}</div>
                </div>
            `).join('');
        }

        function openCharactersSheet() {
            renderCharacters();
            document.getElementById('charactersSheet').classList.add('active');
        }

        function openNotificationsSheet() {
            renderNotifications();
            document.getElementById('notificationsSheet').classList.add('active');
            document.getElementById('notifBadge').style.display = 'none';
        }

        function closeSheet(id) {
            document.getElementById(id).classList.remove('active');
        }

        function closeSheetOnBackdrop(event, id) {
            if (event.target === event.currentTarget) {
                closeSheet(id);
            }
        }

        function selectCharacter(charKey) {
            currentCharacter = charKey;
            renderCharacters();
            setTimeout(() => closeSheet('charactersSheet'), 200);
            
            const char = characters.find(c => c.callback_key === charKey);
            if (char) {
                document.getElementById('welcomeInput').placeholder = `اكتب لـ ${char.name}...`;
                document.getElementById('chatInput').placeholder = `اكتب لـ ${char.name}...`;
            }
        }

        function sendWelcomeMessage() {
            sendMessage('welcome');
        }
        function sendChatMessage() {
            sendMessage('chat');
        }

        async function sendMessage(source) {
            if (isProcessing) return;
            
            const input = document.getElementById(source === 'welcome' ? 'welcomeInput' : 'chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            if (isFirstMessage) {
                document.getElementById('welcomeSection').classList.add('hidden');
                document.getElementById('chatSection').classList.add('active');
                isFirstMessage = false;
            }
            
            isProcessing = true;
            const sendBtn = document.getElementById('sendBtn');
            if (sendBtn) sendBtn.disabled = true;
            
            addMessage(message, true);
            input.value = '';
            showLoading();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character: currentCharacter, message: message })
                });
                
                const data = await response.json();
                removeLoading();
                
                if (data.response) {
                    await streamResponse(data.response);
                } else {
                    addMessage('حدث خطأ في المعالجة', false);
                }
            } catch (error) {
                removeLoading();
                addMessage('حدث خطأ في الاتصال', false);
            }
            
            isProcessing = false;
            if (sendBtn) sendBtn.disabled = false;
        }

        function streamResponse(text) {            return new Promise((resolve) => {
                const container = document.getElementById('messagesContainer');
                const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
                
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                messageDiv.innerHTML = `<span class="message-time">${time}</span>`;
                container.appendChild(messageDiv);
                
                const bubble = document.createElement('div');
                bubble.className = 'ai-bubble';
                
                const label = document.createElement('div');
                label.className = 'ai-bubble-label';
                label.innerHTML = '<i class="fas fa-robot"></i><span>AI</span>';
                bubble.appendChild(label);
                
                const textEl = document.createElement('div');
                textEl.className = 'ai-bubble-text';
                bubble.appendChild(textEl);
                
                const copyBtn = document.createElement('div');
                copyBtn.className = 'ai-bubble-copy';
                copyBtn.innerHTML = '<i class="fas fa-copy copy-icon"></i><span class="copy-text">نسخ</span>';
                copyBtn.onclick = () => copyBubbleContent(copyBtn, textEl.textContent);
                bubble.appendChild(copyBtn);
                
                messageDiv.appendChild(bubble);
                
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                textEl.appendChild(cursor);
                
                let index = 0;
                const interval = setInterval(() => {
                    if (index < text.length) {
                        const char = text.charAt(index);
                        const span = document.createElement('span');
                        span.textContent = char;
                        textEl.insertBefore(span, cursor);
                        index++;
                        container.scrollTop = container.scrollHeight;
                    } else {
                        clearInterval(interval);
                        cursor.remove();
                        setTimeout(() => copyBtn.classList.add('visible'), 100);
                        resolve();
                    }
                }, 12);
            });        }

        function copyBubbleContent(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                button.classList.add('copied');
                button.innerHTML = '<i class="fas fa-check copy-icon"></i><span class="copy-text">تم النسخ</span>';
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.innerHTML = '<i class="fas fa-copy copy-icon"></i><span class="copy-text">نسخ</span>';
                }, 1500);
            });
        }

        function addMessage(text, isOwn) {
            const container = document.getElementById('messagesContainer');
            const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : ''}`;
            messageDiv.innerHTML = `<span class="message-time">${time}</span><div class="message-content">${escapeHtml(text)}</div>`;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showLoading() {
            const container = document.getElementById('messagesContainer');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = '<div class="loading-container"><div class="loading-spinner"></div></div>';
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function removeLoading() {
            const loadingMsg = document.getElementById('loadingMessage');
            if (loadingMsg) loadingMsg.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleWelcomeKey(event) {
            if (event.key === 'Enter' && !isProcessing) sendWelcomeMessage();
        }

        function handleChatKey(event) {
            if (event.key === 'Enter' && !isProcessing) sendChatMessage();        }

        renderNotifications();
    </script>
</body>
</html>
