<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EVILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* إعدادات عامة */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #06143d 0%, #25819e 100%); /* تدرج لوني مطابق للصورة */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* حاوية رئيسية */
        .app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* الشعار والنص الترحيبي */
        .logo-container {
            margin-bottom: 24px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .logo-icon i { font-size: 34px; color: #fff; }
        
        .welcome-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #fff;
        }
        .welcome-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* صندوق الإدخال الزجاجي الرئيسي */
        .input-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.08); /* شفافية زجاجية عالية */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 16px 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
        }
        .input-card:focus-within {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        /* حقل النص */
        .message-input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 4px 0 12px 0;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            outline: none;
            color: #fff;
            resize: none; /* منع تغيير الحجم */
            min-height: 30px;
            max-height: 150px;
        }
        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        /* صف الأزرار السفلية داخل البطاقة */
        .actions-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .left-actions {
            display: flex;
            gap: 8px;
        }
        .pill-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pill-btn i { font-size: 14px; }
        .pill-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
        }
        .icon-btn:active { transform: scale(0.9); }

        /* زر الإرسال الأخضر */
        .send-btn {
            background: #8effa0; /* لون أخضر فاتح مطابق للصورة */
            border: none;
            color: #06143d; /* لون النص متباين */
            box-shadow: 0 4px 15px rgba(142, 255, 160, 0.3);
            width: 38px;
            height: 38px;
        }
        .send-btn i { font-size: 18px; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .send-btn:active:not(:disabled) { transform: scale(0.92); }
        .send-btn.stop-btn {
            background: #ff4d4d;
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 50, 50, 0.3);
        }

        /* شريط الشخصيات (للحفاظ على ميزة تغيير الشخصية) */
        .char-scroll-container { width: 100%; margin: 20px auto 0; overflow: hidden; }
        .char-scroll-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 4px 0;
        }
        .char-scroll-wrapper::-webkit-scrollbar { display: none; }
        .char-selector { display: flex; gap: 10px; width: max-content; margin: 0 auto; }
        .char-selector-btn {
            display: flex; align-items: center; gap: 6px; padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            border-radius: 30px; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-size: 11px; color: rgba(255,255,255,0.7);
        }
        .char-selector-btn.active {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }
        .char-selector-btn i { font-size: 14px; }
        .char-selector-name { font-weight: 500; }

        /* Toast Notification */
        .toast-notification { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 16px; border-radius: 16px; font-size: 13px; z-index: 200; animation: fadeInUp 0.3s ease; text-align: center; max-width: 400px; margin: 0 auto; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 500px) {
            .app-container { padding: 0 10px; }
            .input-card { padding: 12px 14px; }
            .pill-btn { font-size: 10px; padding: 4px 10px; }
            .char-selector-btn { font-size: 10px; padding: 4px 10px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- الشعار والترحيب -->
        <div class="logo-container">
            <div class="logo-icon">
                <i class="bi bi-chat-dots"></i>
            </div>
            <h1 class="welcome-title" id="welcomeTitle">مرحباً، أنا EVILE</h1>
            <p class="welcome-subtitle" id="welcomeSubtitle">كيف يمكنني مساعدتك اليوم؟</p>
        </div>

        <!-- صندوق الإدخال الرئيسي -->
        <div class="input-card" id="welcomeSection">
            <div class="input-wrapper">
                <!-- تم إزالة onkeypress بالكامل، الزر فقط هو من يرسل -->
                <textarea class="message-input" id="mainInput" placeholder="اسألني أي شيء..."></textarea>
            </div>
            
            <div class="actions-row">
                <div class="left-actions">
                    <div class="pill-btn"><i class="bi bi-mic"></i></div>
                    <div class="pill-btn"><i class="bi bi-search"></i> Deep search</div>
                    <div class="pill-btn"><i class="bi bi-globe2"></i> Search</div>
                </div>
                <div class="right-actions">
                    <button class="icon-btn" onclick="openCharactersSheet()" title="اختر شخصية"><i class="bi bi-people"></i></button>
                    <button class="icon-btn send-btn" id="mainSendBtn" onclick="handleSendMessage()">
                        <i class="bi bi-arrow-up"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- شريط الشخصيات (للحركة اللامتناهية) -->
        <div class="char-scroll-container">
            <div class="char-scroll-wrapper" id="charScrollWrapper">
                <div class="char-selector" id="charSelector"></div>
            </div>
        </div>
    </div>

    <!-- نافذة جانبية للشخصيات -->
    <div class="bottom-sheet-overlay" id="charactersSheet" onclick="closeSheetOnBackdrop(event, 'charactersSheet')">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-header">
                <div class="sheet-title"><i class="bi bi-people"></i> الشخصيات</div>
                <button class="sheet-close" onclick="closeSheet('charactersSheet')"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="sheet-instruction">اختر الشخصية المناسبة لمحادثتك</div>
            <div id="charactersList" class="characters-list"></div>
        </div>
    </div>

    <style>
        /* CSS للنافذة الجانبية (موافق للثيم الجديد) */
        .bottom-sheet-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
        .bottom-sheet-overlay.active { display: flex; }
        .bottom-sheet { width: 100%; max-width: 600px; max-height: 80vh; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 25px 25px 0 0; padding: 20px; animation: slideUp 0.4s ease; overflow-y: auto; display: flex; flex-direction: column; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .sheet-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sheet-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #fff; }
        .sheet-close { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; border: none; }
        .sheet-instruction { font-size: 11px; text-align: center; margin-bottom: 16px; padding: 6px; border-radius: 30px; color: rgba(255,255,255,0.6); }
        .characters-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 50vh; }
        .char-list-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 16px; width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .char-list-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; }
        .char-list-info { flex: 1; text-align: right; }
        .char-list-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; color: #fff; }
        .char-list-desc { font-size: 10px; line-height: 1.3; color: rgba(255,255,255,0.6); }
        .char-list-check { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; opacity: 0; }
        .char-list-item.active .char-list-check { opacity: 1; background: #8effa0; color: #06143d; }
    </style>

    <script>
        const characters = {{ characters|tojson }};
        let telegramId = {{ telegram_id|tojson }};
        const latestNotification = {{ latest_notification|tojson }};
        let currentCharacter = characters.length > 0 ? characters[0].callback_key : 'logo_maker';
        let isProcessing = false;
        let isStreaming = false;
        let abortController = null;

        const charScrollWrapper = document.getElementById('charScrollWrapper');
        const mainInput = document.getElementById('mainInput');
        const sendBtn = document.getElementById('mainSendBtn');

        function showToastNotification(message, duration = 10000) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.remove(); }, duration);
        }

        function renderCharSelector() {
            const selector = document.getElementById('charSelector');
            if (!characters || characters.length === 0) {
                selector.innerHTML = '<div class="char-selector-btn" style="cursor:default;">لا توجد شخصيات</div>';
                return;
            }
            let repeatedChars = [];
            for(let i=0; i<3; i++) { repeatedChars = repeatedChars.concat(characters); }
            selector.innerHTML = repeatedChars.map(char => `
                <div class="char-selector-btn ${char.callback_key === currentCharacter ? 'active' : ''}" data-key="${char.callback_key}">
                    <i class="bi bi-robot"></i>
                    <span class="char-selector-name">${escapeHtml(char.name)}</span>
                </div>
            `).join('');
            
            document.querySelectorAll('.char-selector-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const key = btn.getAttribute('data-key');
                    if (key) selectCharacter(key);
                });
            });
            
            if (charScrollWrapper) {
                const isOverflowing = selector.scrollWidth > charScrollWrapper.clientWidth;
                if (isOverflowing) {
                    charScrollWrapper.classList.add('overflowing');
                    const singleSetWidth = selector.scrollWidth / 3;
                    charScrollWrapper.scrollLeft = singleSetWidth;
                } else {
                    charScrollWrapper.style.display = 'flex';
                    charScrollWrapper.style.justifyContent = 'center';
                }
            }
        }

        function attachInfiniteScrollListener() {
            if (!charScrollWrapper) return;
            let isResetting = false;
            charScrollWrapper.addEventListener('scroll', () => {
                if (isResetting) return;
                const totalWidth = document.getElementById('charSelector').scrollWidth;
                if (totalWidth === 0) return;
                const singleSetWidth = totalWidth / 3;
                const scrollLeft = charScrollWrapper.scrollLeft;

                if (scrollLeft >= singleSetWidth * 2 - 20) {
                    isResetting = true;
                    charScrollWrapper.scrollLeft = singleSetWidth;
                    setTimeout(() => { isResetting = false; }, 50);
                } else if (scrollLeft <= 20) {
                    isResetting = true;
                    charScrollWrapper.scrollLeft = singleSetWidth * 2;
                    setTimeout(() => { isResetting = false; }, 50);
                }
            });
        }

        function updateWelcomeDisplay() {
            const char = characters.find(c => c.callback_key === currentCharacter);
            const title = document.getElementById('welcomeTitle');
            const subtitle = document.getElementById('welcomeSubtitle');
            if (char) {
                title.textContent = `مرحباً، أنا ${char.name}`;
                subtitle.textContent = char.description;
            } else if (characters.length > 0) {
                const first = characters[0];
                title.textContent = `مرحباً، أنا ${first.name}`;
                subtitle.textContent = first.description;
            } else {
                title.textContent = "مرحباً، أنا EVILE";
                subtitle.textContent = "كيف يمكنني مساعدتك اليوم؟";
            }
        }

        function renderCharactersSheet() {
            const list = document.getElementById('charactersList');
            if (!characters || characters.length === 0) {
                list.innerHTML = '<div class="char-list-item" style="justify-content:center; color:rgba(255,255,255,0.6);">لا توجد شخصيات بعد</div>';
                return;
            }
            list.innerHTML = characters.map(char => `
                <div class="char-list-item ${char.callback_key === currentCharacter ? 'active' : ''}" onclick="selectCharacter('${char.callback_key}')">
                    <div class="char-list-icon"><i class="bi bi-robot"></i></div>
                    <div class="char-list-info">
                        <div class="char-list-name">${escapeHtml(char.name)}</div>
                        <div class="char-list-desc">${escapeHtml(char.description)}</div>
                    </div>
                    <div class="char-list-check"><i class="bi bi-check-lg"></i></div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function updateSendButton(isStreamingActive) {
            if (isStreamingActive) {
                sendBtn.disabled = false;
                sendBtn.classList.add('stop-btn');
                sendBtn.innerHTML = '<i class="bi bi-stop-circle"></i>';
            } else {
                sendBtn.classList.remove('stop-btn');
                sendBtn.innerHTML = '<i class="bi bi-arrow-up"></i>';
            }
        }

        function stopStreaming() {
            if (abortController) {
                abortController.abort();
                abortController = null;
                isStreaming = false;
                isProcessing = false;
                updateSendButton(false);
            }
        }

        function addMessage(text, isOwn) {
            // تحويل منطقة الكتابة إلى منطقة عرض المحادثة (للحفاظ على الوظيفة)
            const card = document.getElementById('welcomeSection');
            if (card.querySelector('.messages-container')) {
                const container = card.querySelector('.messages-container');
                const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
                const div = document.createElement('div');
                div.className = `message ${isOwn ? 'own' : ''}`;
                div.style.cssText = `margin-bottom: 10px; animation: messageSlide 0.3s ease; text-align: ${isOwn ? 'left' : 'right'};`;
                div.innerHTML = `<div style="font-size: 9px; margin-bottom: 3px; color: rgba(255,255,255,0.6);">${time}</div><div style="background: ${isOwn ? 'rgba(142, 255, 160, 0.2)' : 'rgba(255, 255, 255, 0.1)'}; padding: 8px 12px; border-radius: 12px; display: inline-block; max-width: 85%; color: #fff;">${escapeHtml(text)}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            } else {
                // التهيئة الأولى (عند إرسال أول رسالة)
                card.innerHTML = `<div class="messages-container" style="max-height: 60vh; overflow-y: auto; padding-bottom: 10px;"></div><div class="input-wrapper" style="display:flex; gap:10px; margin-top:10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;"><input type="text" class="message-input" id="chatInput" placeholder="اكتب رداً..." style="flex:1; background:transparent; border:none; color:#fff; outline:none;"><button class="icon-btn send-btn" id="chatSendBtn" onclick="handleSendChat()" style="background:#8effa0; color:#06143d;"><i class="bi bi-arrow-up"></i></button></div>`;
                document.getElementById('chatInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) { /* منع الإرسال بالإنتر */ }
                });
                addMessage(text, isOwn);
            }
        }

        function showLoading() {
            const container = document.getElementById('welcomeSection').querySelector('.messages-container');
            if(!container) return;
            const div = document.createElement('div');
            div.id = 'loadingMessage';
            div.className = 'message';
            div.style.cssText = "margin-bottom: 10px; text-align: right;";
            div.innerHTML = '<div class="loading-container" style="display:inline-block;"><div class="spinner" style="width:16px; height:16px; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation: spin 0.8s linear infinite;"></div></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeLoading() {
            const el = document.getElementById('loadingMessage');
            if (el) el.remove();
        }

        async function streamResponse(text) {
            return new Promise((resolve) => {
                const container = document.getElementById('welcomeSection').querySelector('.messages-container');
                const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.style.cssText = "margin-bottom: 10px; animation: messageSlide 0.3s ease; text-align: right;";
                msgDiv.innerHTML = `<div style="font-size: 9px; margin-bottom: 3px; color: rgba(255,255,255,0.6);">${time}</div>`;
                container.appendChild(msgDiv);
                const bubble = document.createElement('div');
                bubble.style.cssText = "background: rgba(255, 255, 255, 0.1); padding: 8px 12px; border-radius: 12px; display: inline-block; max-width: 85%; color: #fff; position: relative;";
                bubble.innerHTML = `<div class="ai-bubble-text"></div>`;
                msgDiv.appendChild(bubble);
                const textEl = bubble.querySelector('.ai-bubble-text');
                let idx = 0;
                const interval = setInterval(() => {
                    if (idx < text.length) {
                        textEl.textContent += text.charAt(idx);
                        idx++;
                        container.scrollTop = container.scrollHeight;
                    } else {
                        clearInterval(interval);
                        resolve();
                    }
                }, 20);
            });
        }

        async function actuallySendMessage(message) {
            if (isProcessing) return;
            isProcessing = true;
            abortController = new AbortController();
            isStreaming = true;
            updateSendButton(true);

            addMessage(message, true);
            document.getElementById('mainInput').value = '';
            showLoading();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character: currentCharacter, message: message }),
                    signal: abortController.signal
                });
                
                if (!isStreaming) { removeLoading(); throw new Error('Stream cancelled'); }
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    fullText += decoder.decode(value, { stream: true });
                }
                removeLoading();
                if (fullText) { await streamResponse(fullText); } 
                else { addMessage('لم يتم استلام رد من الخادم.', false); }
            } catch (err) {
                removeLoading();
                if (err.name !== 'AbortError' && err.message !== 'Stream cancelled') {
                    addMessage('خطأ في الاتصال بالخادم.', false);
                }
            } finally {
                isStreaming = false;
                isProcessing = false;
                abortController = null;
                updateSendButton(false);
            }
        }

        function handleSendMessage() {
            if (isStreaming) { stopStreaming(); return; }
            if (isProcessing) return;
            const msg = mainInput.value.trim();
            if (!msg) return;
            actuallySendMessage(msg);
        }

        function handleSendChat() {
            if (isStreaming) { stopStreaming(); return; }
            if (isProcessing) return;
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            actuallySendMessage(msg);
        }

        function openCharactersSheet() { renderCharactersSheet(); document.getElementById('charactersSheet').classList.add('active'); }
        function closeSheet(id) { document.getElementById(id).classList.remove('active'); }
        function closeSheetOnBackdrop(e, id) { if (e.target === e.currentTarget) closeSheet(id); }
        
        function selectCharacter(key) {
            currentCharacter = key;
            renderCharSelector(); renderCharactersSheet(); updateWelcomeDisplay();
            closeSheet('charactersSheet');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCharSelector(); attachInfiniteScrollListener(); updateWelcomeDisplay();
            // طباعة الإشعار إن وجد
            if (latestNotification && latestNotification.show_in_chat) {
                showToastNotification(latestNotification.title + ': ' + latestNotification.text, 10000);
            }
            
            // منع زر Enter من الإرسال (السماح بإدخال سطر جديد)
            mainInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    // لا تفعل شيئاً، فقط اترك المؤشر ينتقل للسطر الجديد إذا أردت،
                    // أو هنا يمكنك تعطيل السطر الجديد إذا كنت تريد الضغط على Enter فقط لسطر جديد
                }
            });
        });
    </script>
